    <script>
        const EXAM_BANK = [
            {
                title: "De Kracht van Groen in de Stad",
                text: `<h4>Een betonnen oase</h4><p>Veel Nederlandse steden kampen met hittestress. Door het grote oppervlak aan steen en asfalt koelt het 's nachts minder af dan in landelijke gebieden. Stedebouwkundigen adviseren daarom om meer parken en 'groene daken' aan te leggen. Dit helpt niet alleen bij het verlagen van de temperatuur, maar ook bij de wateropvang tijdens hevige regenbuien, die door klimaatverandering steeds vaker voorkomen.</p><h4>Gezondheid en psyche</h4><p>Naast de ecologische voordelen heeft groen een bewezen effect op de menselijke gezondheid. Uit onderzoek blijkt dat bewoners in groene wijken minder last hebben van stressgerelateerde aandoeningen. Kinderen die opgroeien in de buurt van natuurgebieden vertonen vaak een betere concentratie op school. Groen wordt daarom niet langer gezien als luxe, maar als een essentieel onderdeel van de volksgezondheid.</p><h4>Financiële drempels</h4><p>Ondanks deze voordelen is de aanleg van stadsparken kostbaar. Gemeenten moeten kiezen tussen woningbouw en natuur. Critici stellen dat de economische waarde van een gebouw direct meetbaar is, terwijl de voordelen van een boom lastiger in euro's uit te drukken zijn. Toch pleiten experts voor een langetermijnvisie, waarbij zorgkosten worden meegewogen in het budget voor stedelijke inrichting.</p>`,
                questions: [
                    { q: "Waarom koelt het in de stad 's nachts minder snel af?", o: ["Omdat er te veel mensen in kleine huizen wonen.", "Omdat steen en asfalt de warmte vasthouden.", "Omdat er te weinig wind tussen de hoge gebouwen waait.", "Omdat steden meer regenwater moeten opvangen."], c: 1 },
                    { q: "Wat is een voordeel van een groene omgeving voor schoolkinderen?", o: ["Ze kunnen buiten gymles krijgen.", "Ze hoeven minder vaak naar de dokter.", "Het verbetert hun vermogen om zich te concentreren.", "Ze leren sneller over verschillende plantensoorten."], c: 2 },
                    { q: "Wat is het belangrijkste argument van de critici tegen meer groen?", o: ["Bomen zijn duurder om te onderhouden dan gebouwen.", "De woningnood is belangrijker dan klimaatverandering.", "Er is in Nederland helemaal geen ruimte voor parken.", "De baten zijn niet direct financieel zichtbaar."], c: 3 }
                ]
            },
            {
                title: "De Evolutie van Betalen",
                text: `<h4>Van munt naar mobiel</h4><p>De manier waarop wij in Nederland afrekenen is in korte tijd drastisch veranderd. Waar we tien jaar geleden nog regelmatig de portemonnee trokken voor contant geld, is de pinpas nu de absolute marktleider. De nieuwste stap in deze ontwikkeling is het mobiel betalen via de smartphone of smartwatch. Veel consumenten ervaren dit als een snelle en veilig methode, omdat zij geen pincode meer hoeven in te tikken.</p><h4>De nadelen van een 'cashless' maatschappij</h4><p>Hoewel digitaal betalen efficiënt is, zijn er ook zorgen. Winkeliers weigeren soms contant geld, wat problematisch is voor ouderen of mensen zonder bankrekening. Bovendien wijzen privacy-experts erop dat elke digitale transactie een spoor achterlaat. Banken en bedrijven kunnen hierdoor precies zien waar, wanneer en waaraan wij ons geld uitgeven. Dit geeft hen een enorme macht over persoonlijke data.</p><h4>Cybercriminaliteit</h4><p>Met de digitalisering verschuift ook de criminaliteit. In plaats van fysieke zakkenrollers hebben we nu te maken met phishing en helpdeskfraude. Criminelen proberen via geraffineerde trucs toegang te krijgen tot de bank-app van slachtoffers. De overheid probeert burgers hiertegen te waarschuwen, maar de methodes van oplichters worden steeds geloofwaardiger.</p>`,
                questions: [
                    { q: "Wat wordt in de tekst genoemd als reden voor de populariteit van mobiel betalen?", o: ["Men hoeft geen fysieke pincode meer te gebruiken.", "Het is goedkoper voor de consument.", "De overheid geeft korting op digitale aankopen.", "Het is de enige manier om in supermarkten te betalen."], c: 0 },
                    { q: "Voor wie is een maatschappij zonder contant geld vooral een probleem?", o: ["Voor winkeliers die geen wisselgeld meer hebben.", "Voor jongeren die geen bankrekening kunnen openen.", "Voor banken die te veel data moeten opslaan.", "Voor mensen die niet goed overweg kunnen met digitale middelen."], c: 3 },
                    { q: "Wat is de kern van de waarschuwing over phishing?", o: ["Dat zakkenrollers nu in de trein werken.", "Dat bank-apps vaak technische fouten bevatten.", "Dat criminelen via digitale wegen bankgegevens stelen.", "Dat de overheid te weinig doet tegen internetfraude."], c: 2 }
                ]
            },
            {
                title: "Thuiswerken: De Nieuwe Norm?",
                text: `<h4>Een onomkeerbare trend</h4><p>Sinds de coronapandemie is thuiswerken voor veel kantoormedewerkers de standaard geworden. Wat begon als een noodmaatregel, is nu verankerd in veel arbeidscontracten. Veel werknemers waarderen de flexibiliteit en het wegvallen van de reistijd. Dit zorgt voor een betere balans tussen werk en privéleven, mits men de discipline heeft om op tijd de laptop af te sluiten.</p><h4>Verlies van verbinding</h4><p>Toch zijn er ook kritische geluiden. Bedrijfsleiders merken dat de creativiteit en de onderlinge band tussen collega's onder druk staan. De informele praatjes bij het koffiezetapparaat, waar vaak de beste ideeën ontstaan, zijn niet te vervangen door geplande videocalls. Daarnaast klagen sommige thuiswerkers over eenzaamheid en een gebrek aan motivatie wanneer zij dagenlang niemand fysiek ontmoeten.</p><h4>De hybride oplossing</h4><p>Het meest waarschijnlijke scenario voor de toekomst is het hybride model. Hierbij werkt de werknemer een paar dagen thuis en komt hij voor vergaderingen en sociale contacten naar kantoor. Dit vraagt om een andere inrichting van de werkplek; kantoren worden steeds vaker 'ontmoetingsplekken' in plaats van ruimtes vol individuele bureaus.</p>`,
                questions: [
                    { q: "Wat is volgens de tekst een voorwaarde voor een goede balans bij thuiswerken?", o: ["Een snelle internetverbinding hebben.", "Zelf de discipline hebben om de werkdag te stoppen.", "Elke dag minstens vier videocalls plannen.", "Een aparte kamer in huis hebben als kantoor."], c: 1 },
                    { q: "Waarom maken werkgevers zich zorgen over volledig thuiswerken?", o: ["Omdat er minder spontane creatieve ideeën ontstaan.", "Omdat de huur van het kantoor te duur wordt.", "Omdat werknemers thuis minder uren maken.", "Omdat videobellen te veel technische storingen geeft."], c: 0 },
                    { q: "Wat verandert er aan de functie van het kantoor in het hybride model?", o: ["Het kantoor wordt kleiner en goedkoper.", "Er komen meer vaste bureaus voor elke werknemer.", "Het kantoor wordt vooral een plek om anderen te ontmoeten.", "Het kantoor wordt verboden op maandag en vrijdag."], c: 2 }
                ]
            },
             {
                title: "De Betekenis van Erfgoed",
                text: `<h4>Geschiedenis in de buurt</h4><p>Nederland staat vol met historische gebouwen, van oude grachtenpanden tot industriële hallen. Dit noemen we cultureel erfgoed. Het bewaren hiervan is belangrijk omdat het ons vertelt wie we zijn en waar we vandaan komen. Het geeft een stad of dorp een eigen gezicht en trekt bovendien toeristen aan, wat weer goed is voor de lokale economie.</p><h4>Moderniseren of behouden?</h4><p>Er ontstaat echter vaak discussie wanneer een oud pand een nieuwe functie moet krijgen. Moet een oude kerk een bibliotheek worden of is dat respectloos? Het onderhouden van monumenten is bovendien zeer kostbaar. De isolatie van een pand uit 1700 is bijvoorbeeld veel moeilijker dan bij nieuwbouw, wat een uitdaging is in tijden van de energietransitie.</p><h4>Immaterieel erfgoed</h4><p>Erfgoed gaat niet alleen over stenen. Ook tradities, zoals het vieren van carnaval of de Nederlandse molenaarskunst, horen hierbij. Dit noemen we immaterieel erfgoed. Het is de uitdaging om deze tradities levend te houden voor nieuwe generaties, zonder dat ze hun oorspronkelijke betekenis verliezen in een moderne, geglobaliseerde wereld.</p>`,
                questions: [
                    { q: "Waarom is erfgoed economisch gezien belangrijk voor een regio?", o: ["Omdat oude gebouwen minder belasting betalen.", "Omdat de overheid gratis onderhoud uitvoert.", "Omdat het toeristen en bezoekers naar de plek lokt.", "Omdat het de huizenprijzen van nieuwbouw verlaagt."], c: 2 },
                    { q: "Welk praktisch probleem wordt genoemd bij het behouden van monumenten?", o: ["Ze zijn erg lastig goed te isoleren voor het klimaat.", "Het is verboden om er een bibliotheek in te vestigen.", "Mensen vinden oude kerken vaak niet mooi genoeg.", "Er zijn te weinig toeristen die monumenten willen bezoeken."], c: 0 },
                    { q: "Wat wordt in de tekst verstaan onder 'immaterieel erfgoed'?", o: ["Kleine monumenten die niet beschermd zijn.", "De geschiedenis van de Nederlandse bouwkunst.", "De waarde van de grond onder een oud pand.", "Tradities en gebruiken die mensen doorgeven."], c: 3 }
                ]
            },
            {
                title: "Robotica in de Landbouw",
                text: `<h4>Boeren in de cloud</h4><p>De tijd van de boer die alleen met een trekker het land op gaat, raakt langzaam achter ons. In de moderne landbouw worden steeds vaker robots en drones ingezet. Drones kunnen vanuit de lucht precies zien welke planten extra mest of water nodig hebben. Hierdoor hoeven boeren minder chemicaliën te gebruiken, wat beter is voor de bodem en het grondwater.</p><h4>De kosten van innovatie</h4><p>Toch is er ook kritiek. De aanschaf van deze technologie is extreem duur, waardoor alleen de allergrootste bedrijven deze investering kunnen doen. Kleine familiebedrijven dreigen hierdoor hun concurrentiepositie te verliezen. Bovendien maakt de afhankelijkheid van software de boeren kwetsbaar voor storingen of cyberaanvallen op hun systemen.</p><h4>Voedselzekerheid</h4><p>Voorstanders benadrukken dat technologie de enige manier is om de groeiende wereldbevolking te blijven voeden. Door efficiënter te werken, kan de opbrengst per hectare omhoog zonder dat de natuur verder wordt uitgeput. Het vak van de boer verandert hierdoor van fysiek werk naar een meer technische en analyserende functie.</p>`,
                questions: [
                    { q: "Wat is een ecologisch voordeel van het gebruik van drones?", o: ["De boer hoeft niet meer zelf op de trekker te zitten.", "Drones verjagen vogels die de oogst opeten.", "Er worden minder chemicaliën op het land gebruikt.", "Het grondwater wordt sneller aangevuld door de lucht."], c: 2 },
                    { q: "Wat is het risico voor kleine landbouwbedrijven?", o: ["Ze kunnen de hoge investeringskosten niet betalen.", "Ze kunnen de dure software niet begrijpen.", "Ze hebben niet genoeg personeel om de robots te besturen.", "Ze mogen geen gebruikmaken van drones van de overheid."], c: 0 },
                    { q: "Hoe verandert de rol van de boer volgens de tekst?", o: ["Hij gaat vaker handmatig werk doen op het land.", "Hij moet vaker overleggen met de lokale overheid.", "Hij hoeft helemaal niet meer te werken op de boerderij.", "Zijn werk wordt meer technisch en gericht op data."], c: 3 }
                ]
            },
            {
                title: "De Kracht van Microplastics",
                text: `<h4>Een onzichtbaar gevaar</h4><p>Wetenschappers maken zich grote zorgen over de verspreiding van microplastics. Deze deeltjes, die kleiner zijn dan vijf millimeter, ontstaan vaak door de afbraak van groter plasticafval of door slijtage van autobanden en synthetische kleding. Omdat ze zo klein zijn, passeren ze gemakkelijk de filtersystemen van waterzuiveringsinstallaties, waardoor ze in onze rivieren en uiteindelijk in de oceanen terechtkomen.</p><h4>Impact op de voedselketen</h4><p>In de zee worden deze deeltjes gegeten door kleine organismen, die vervolgens weer gegeten worden door vissen. Hierdoor hopen de schadelijke stoffen zich op in de voedselketen. Recent onderzoek toont aan dat microplastics inmiddels ook in menselijk bloed en organen zijn aangetroffen. De langetermijneffecten hiervan op de volksgezondheid zijn nog onduidelijk, maar de eerste signalen zijn verontrustend.</p><h4>Beleid en oplossingen</h4><p>De Europese Unie heeft inmiddels strengere regels aangekondigd voor het toevoegen van microplastics aan consumentenproducten zoals cosmetica. Toch is dit slechts een deel van de oplossing. Experts stellen dat een fundamentele verandering in onze omgang met wegwerpplastic nodig is om de instroom van deze deeltjes in de natuur volledig te stoppen.</p>`,
                questions: [
                    { q: "Waarom belanden microplastics zo makkelijk in de natuur?", o: ["Omdat ze door vissen uit de filters worden gehaald.", "Omdat ze te klein zijn voor de huidige zuiveringsinstallaties.", "Omdat mensen ze expres in de rivieren gooien.", "Omdat ze alleen in synthetische kleding voorkomen."], c: 1 },
                    { q: "Wat is een direct gevolg van microplastics in de oceaan?", o: ["Vissen kunnen de deeltjes niet meer zien drijven.", "De temperatuur van het zeewater stijgt sneller.", "Er ontstaan minder golven door de plasticlaag.", "Schadelijke stoffen hopen zich op in levende wezens."], c: 3 },
                    { q: "Welke maatregel heeft de EU volgens de tekst genomen?", o: ["Een verbod op alle autobanden in steden.", "Strengere regels voor het gebruik in cosmetica.", "Het verplicht stellen van filters op kleding.", "Het sluiten van alle plasticfabrieken."], c: 1 }
                ]
            },
            {
                title: "De Toekomst van Stedelijk Vervoer",
                text: `<h4>De stad sluit de poorten</h4><p>In veel grote Europese steden wordt de auto steeds meer uit het centrum geweerd. Parkeertarieven stijgen fors en steeds meer straten worden omgevormd tot voetgangersgebied. Het doel is tweeledig: het verbeteren van de luchtkwaliteit en het vergroten van de verkeersveiligheid. Maar deze verandering roept ook weerstand op bij ondernemers die vrezen voor hun bereikbaarheid.</p><h4>De opkomst van de 'deelmobiliteit'</h4><p>Als alternatief voor de eigen auto verschijnen er overal deelscooters en deelfietsen. In theorie een prachtig systeem: je gebruikt het vervoermiddel alleen wanneer je het nodig hebt en zet het daarna weer weg. Echter, in de praktijk zorgen de rondslingerende voertuigen voor veel overlast op de stoep, wat weer leidt tot nieuwe regels van de gemeente.</p><h4>Openbaar vervoer als ruggengraat</h4><p>Ondanks alle nieuwe gadgets blijft een goed functionerend netwerk van treinen, trams en bussen cruciaal. Experts benadrukken dat deelmobiliteit alleen werkt als de verbinding met het grotere netwerk naadloos is. Dit betekent dat er op knooppunten voldoende ruimte moet zijn voor verschillende vervoersvormen, zodat de reiziger zonder vertraging kan overstappen.</p>`,
                questions: [
                    { q: "Waarom willen steden minder auto's in het centrum?", o: ["Om de lucht schoner te maken en de veiligheid te verhogen.", "Om meer ruimte te maken voor parkeerplaatsen.", "Omdat autobezitters te weinig belasting betalen.", "Zodat mensen meer geld uitgeven in lokale winkels."], c: 0 },
                    { q: "Wat is een praktisch nadeel van deelmobiliteit in de stad?", o: ["De voertuigen zijn vaak te duur voor de gewone burger.", "De voertuigen blokkeren vaak de openbare ruimte.", "De accu's van de scooters zijn te snel leeg.", "Er zijn te weinig apps om de fietsen te huren."], c: 1 },
                    { q: "Wanneer is deelmobiliteit volgens de tekst echt succesvol?", o: ["Als iedereen zijn eigen auto definitief verkoopt.", "Wanneer de overheid de tarieven volledig betaalt.", "Als de verbinding met het openbaar vervoer goed is.", "Als er meer parkeerplaatsen voor scooters komen."], c: 2 }
                ]
            },
            {
                title: "De Psychologie van Consumptie",
                text: `<h4>Verleiding in de supermarkt</h4><p>Heb je je ooit afgevraagd waarom de melk altijd achterin de supermarkt staat? Dit is geen toeval. Retail-psychologen ontwerpen winkelpaden zo dat consumenten langs zoveel mogelijk producten moeten lopen voordat ze bij hun dagelijkse benodigdheden zijn. Hoe langer je in de winkel verblijft, hoe groter de kans op impulsaankopen.</p><h4>De invloed van geur en geluid</h4><p>Niet alleen de indeling, maar ook de zintuigen worden beïnvloed. De geur van versgebakken brood bij de ingang wekt eetlust op, waardoor mensen meer voedsel kopen. Rustige achtergrondmuziek zorgt ervoor dat klanten langzamer gaan lopen, terwijl felle kleuren en aanbiedingsborden de aandacht trekken naar producten met een hogere winstmarge.</p><h4>Bewustwording</h4><p>Consumentenorganisaties proberen burgers bewuster te maken van deze tactieken. Een eenvoudige oplossing is het maken van een boodschappenlijstje en het vermijden van de winkel als je honger hebt. Toch blijven de marketingtrucs effectief, simpelweg omdat ze inspelen op onbewuste behoeften en instincten die we als mens allemaal bezitten.</p>`,
                questions: [
                    { q: "Waarom staat melk vaak op een onhandige plek in de winkel?", o: ["Omdat melk koel moet blijven bij de achterwand.", "Zodat vakkenvullers de melk makkelijker kunnen pakken.", "Omdat melk een zwaar product is voor de klant.", "Om klanten te dwingen langs andere producten te lopen."], c: 3 },
                    { q: "Wat is het effect van rustige muziek in de supermarkt?", o: ["Mensen worden vrolijker en kopen luxere producten.", "Klanten nemen meer tijd om door de winkel te lopen.", "Het personeel kan beter werken met muziek op.", "Het geluid van rammelende karretjes wordt gedempt."], c: 1 },
                    { q: "Wat adviseert de tekst om impulsaankopen te voorkomen?", o: ["Niet met een lege maag naar de winkel gaan.", "Alleen nog maar online boodschappen doen.", "Altijd de goedkoopste producten onderaan kiezen.", "Geen karretje gebruiken maar een mandje."], c: 0 }
                ]
            },
            {
                title: "De Kracht van Herinneringen",
                text: `<h4>Het geheugen als archief</h4><p>Ons geheugen is geen perfecte videocamera die alles exact opslaat. Het lijkt meer op een rommelig archief waar fragmenten soms verloren gaan of worden aangepast. Emotioneel geladen gebeurtenissen onthouden we vaak beter dan alledaagse feiten. Dit komt doordat de hersenen prioriteit geven aan informatie die cruciaal lijkt voor onze overleving of ons welzijn.</p><h4>Valse herinneringen</h4><p>Wist je dat het mogelijk is om herinneringen aan gebeurtenissen te hebben die nooit hebben plaatsgevonden? Door suggestieve vragen of het zien van oude foto's kunnen onze hersenen beelden creëren die we als 'echt' ervaren. Dit fenomeen is van groot belang in de rechtspraak, waar getuigenverklaringen soms minder betrouwbaar blijken dan aanvankelijk gedacht.</p><h4>Training van de geest</h4><p>Hoewel we het geheugen niet kunnen 'upgraden' als een computer, kunnen we het wel trainen. Gezonde voeding, voldoende slaap en mentale uitdagingen zoals puzzelen of het leren van een nieuwe taal helpen om de verbindingen in de hersenen soepel te houden. Vooral slaap is essentieel, omdat de hersenen tijdens de nachtrust informatie ordenen en opslaan.</p>`,
                questions: [
                    { q: "Waarom onthouden we sommige dingen beter dan andere?", o: ["Vanwege de emotionele waarde van die informatie.", "Omdat we die dingen vaker op televisie zien.", "Omdat onze hersenen alle feiten precies hetzelfde opslaan.", "Dat hangt af van hoe laat op de dag het gebeurde."], c: 0 },
                    { q: "Wat is een gevaar van getuigenverklaringen volgens de tekst?", o: ["Getuigen durven vaak de waarheid niet te zeggen.", "Mensen herinneren zich alleen de negatieve dingen.", "Rechters luisteren niet goed naar de getuigen.", "Het geheugen kan valse beelden maken door suggestie."], c: 3 },
                    { q: "Welke rol speelt slaap bij het geheugen?", o: ["Tijdens de slaap vergeten we nare gebeurtenissen.", "Slaap zorgt ervoor dat we sneller kunnen puzzelen.", "Het helpt de hersenen om informatie te verwerken.", "Zonder slaap kunnen we geen nieuwe taal leren."], c: 2 }
                ]
            },
            {
                title: "De Impact van Sociale Media op Zelfbeeld",
                text: `<h4>De perfecte wereld</h4><p>Op platforms als Instagram en TikTok zien we dagelijks de meest perfecte versies van anderen. Gefilterde foto's, luxe vakanties en succesverhalen domineren de tijdlijn. Psychologen waarschuwen dat dit een vertekend beeld van de werkelijkheid geeft. Vooral jongeren spiegelen zich aan deze beelden, wat kan leiden tot onzekerheid over het eigen lichaam en leven.</p><h4>De 'Like'-economie</h4><p>De behoefte aan sociale goedkeuring is diep geworteld in de mens. Het ontvangen van een 'like' of een positieve reactie activeert het beloningssysteem in de hersenen. Dit werkt verslavend; gebruikers blijven content plaatsen in de hoop op een nieuwe 'kick'. Wanneer de verwachtte interactie uitblijft, kan dit gevoelens van afwijzing en eenzaamheid versterken.</p><h4>Digitale balans</h4><p>Steeds meer mensen kiezen voor een 'digitale detox', waarbij ze sociale media voor een bepaalde tijd links laten liggen. Het doel is om de aandacht te verleggen naar de fysieke wereld en echte interacties. Scholen en ouders spelen hierbij een belangrijke rol door jongeren te leren kritisch te kijken naar wat zij online zien en de schermtijd te beperken.</p>`,
                questions: [
                    { q: "Wat is het probleem met de beelden op sociale media?", o: ["Ze zijn vaak van slechte kwaliteit door de filters.", "Er wordt te veel reclame gemaakt voor vakanties.", "Ze tonen een onrealistisch perfect beeld van de realiteit.", "Ze zorgen ervoor dat mensen minder gaan lezen."], c: 2 },
                    { q: "Waarom werken 'likes' verslavend volgens de tekst?", o: ["Omdat je er geld mee kunt verdienen online.", "Omdat ze een beloningsgevoel in de hersenen geven.", "Omdat je anders geen vrienden meer kunt maken.", "Omdat de app stopt met werken zonder interactie."], c: 1 },
                    { q: "Wat is het doel van een 'digitale detox'?", o: ["Het sneller leren gebruiken van nieuwe apps.", "Het besparen van batterij op je mobiele telefoon.", "Het ontdekken van nieuwe sociale media platforms.", "De focus verleggen van het scherm naar de echte wereld."], c: 3 }
                ]
            },
            {
                title: "De Rol van Bijen in de Natuur",
                text: `<h4>Onmisbare bestuivers</h4><p>Zonder bijen zou onze supermarkt er heel anders uitzien. Bijen zijn verantwoordelijk voor de bestuiving van een groot deel van onze groenten en fruit. Denk aan appels, aardbeien en koffie. Door van bloem naar bloem te vliegen, verspreiden zij stuifmeel, wat essentieel is voor de voortplanting van planten. De economische waarde van deze gratis dienst is miljarden euro's.</p><h4>Bijensterfte</h4><p>Helaas gaat het niet goed met de bij. Door het gebruik van bestrijdingsmiddelen in de landbouw en het verdwijnen van bloemrijke weilanden, neemt het aantal bijenvolken drastisch af. Ook klimaatverandering speelt een rol; zachte winters verstoren het natuurlijke ritme van de insecten, waardoor ze te vroeg actief worden en sterven door voedselgebrek.</p><h4>Wat kunnen we doen?</h4><p>Iedereen kan een steentje bijdragen aan het behoud van de bij. Door in de tuin of op het balkon bloemen te planten die veel nectar bevatten, help je de bijen te overleven. Ook het plaatsen van 'bijenhotels' biedt hen een veilige plek om te nestelen. Gemeenten dragen bij door minder vaak de bermen langs de wegen te maaien, zodat wilde bloemen de kans krijgen om te groeien.</p>`,
                questions: [
                    { q: "Wat is de belangrijkste functie van bijen voor de mens?", o: ["Ze produceren honing voor in de supermarkt.", "Ze zorgen voor de voortplanting van veel voedselgewassen.", "Ze verjagen andere schadelijke insecten in de tuin.", "Ze zijn een indicator voor hoe warm het buiten is."], c: 1 },
                    { q: "Hoe beïnvloedt de klimaatverandering de bijenpopulatie?", o: ["Zachte winters zorgen voor een tekort aan voedsel op het verkeerde moment.", "Door te veel regen verdrinken de bijen in hun nesten.", "Bijen kunnen niet goed vliegen als het te warm is.", "Er groeien door de warmte te veel bloemen in de berm."], c: 0 },
                    { q: "Hoe kunnen gemeenten bijdragen aan het helpen van de bij?", o: ["Door meer asfalt aan te leggen in de woonwijken.", "Door gratis bijenhotels uit te delen aan burgers.", "Door bermen minder vaak kort te maaien.", "Door het verbieden van tuinen met tegels."], c: 2 }
                ]
            },
            {
                title: "Het Belang van Voorlezen",
                text: `<h4>Taalontwikkeling op jonge leeftijd</h4><p>Voorlezen is veel meer dan alleen een gezellig moment voor het slapengaan. Het is een krachtig middel voor de taalontwikkeling van jonge kinderen. Door verhalen te horen, komen kinderen in aanraking met woorden en zinsstructuren die ze in het dagelijks taalgebruik minder snel horen. Dit vergroot hun woordenschat en helpt hen later bij het leren lezen en schrijven op school.</p><h4>Emotionele band</h4><p>Naast de educatieve voordelen versterkt voorlezen de band tussen ouder en kind. Het is een rustmoment in een drukke dag, waarbij er aandacht is voor elkaar. Verhalen kunnen ook een veilige manier zijn om moeilijke onderwerpen te bespreken, zoals angst, vriendschap of verlies. Het kind leert zich inleven in de gevoelens van de personages.</p><h4>Digitale alternatieven</h4><p>Tegenwoordig zijn er veel luisterboeken en interactieve apps beschikbaar. Hoewel deze handig kunnen zijn, vervangen ze het 'echte' voorlezen niet volledig. Bij een app is er minder ruimte voor de interactie tussen de voorlezer en het kind. Het stellen van vragen over het verhaal en het samen bekijken van de plaatjes stimuleert namelijk het begrijpend luisteren.</p>`,
                questions: [
                    { q: "Wat is een direct voordeel van voorlezen voor de schoolprestaties?", o: ["Kinderen leren sneller hoe ze stil moeten zitten.", "Het zorgt voor een grotere woordenschat bij het kind.", "Kinderen hoeven minder vaak huiswerk te maken.", "Het helpt bij het onthouden van historische feiten."], c: 1 },
                    { q: "Hoe kunnen verhalen helpen bij de opvoeding?", o: ["Door kinderen te dwingen om vroeg te gaan slapen.", "Door te laten zien dat lezen belangrijker is dan spelen.", "Ouders hoeven zelf minder te praten met hun kind.", "Door op een veilige manier over emoties te praten."], c: 3 }
                ]
            }
        ];

        let questions = [];
        let answers = new Array(35).fill(null);
        let currentIdx = 0;
        let timeLeft = 110 * 60;

        function setup() {
            questions = [];
            EXAM_BANK.forEach(textSet => {
                textSet.questions.forEach(qObj => {
                    if (questions.length < 35) {
                        questions.push({
                            ...qObj,
                            title: textSet.title,
                            text: textSet.text,
                            id: questions.length
                        });
                    }
                });
            });
            render();
            startTimer();
        }

        function render() {
            if (!questions[currentIdx]) return;
            
            const q = questions[currentIdx];
            document.getElementById('view-text-title').innerText = q.title;
            document.getElementById('view-text-body').innerHTML = q.text;
            document.getElementById('view-q-text').innerText = q.q;
            document.getElementById('num-display').innerText = currentIdx + 1;
            document.getElementById('q-context').innerText = `Onderwerp: ${q.title}`;

            const opts = document.getElementById('view-options');
            opts.innerHTML = '';
            
            q.o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = `opt-btn ${answers[currentIdx] === i ? 'active' : ''}`;
                b.onclick = () => { answers[currentIdx] = i; render(); };
                b.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold mr-4 text-slate-500 border border-slate-200 flex-shrink-0">${String.fromCharCode(65+i)}</span>
                    <span class="text-slate-700 font-medium">${txt}</span>
                `;
                opts.appendChild(b);
            });

            document.getElementById('btn-prev').disabled = currentIdx === 0;
            document.getElementById('btn-next').innerText = currentIdx === 34 ? 'Examen Afronden' : 'Volgende';
            updateProgress();
        }

        function move(dir) {
            if(dir === 1 && currentIdx === 34) { toggleGrid(); return; }
            const nextIdx = currentIdx + dir;
            if (nextIdx >= 0 && nextIdx < 35) {
                currentIdx = nextIdx;
                document.getElementById('text-pane').scrollTop = 0;
                render();
            }
        }

        function updateProgress() {
            const c = document.getElementById('dot-container');
            c.innerHTML = '';
            for(let i=0; i<35; i++) {
                const d = document.createElement('div');
                d.className = `status-dot ${i === currentIdx ? 'current' : ''} ${answers[i] !== null ? 'done' : ''}`;
                c.appendChild(d);
            }
        }

        function toggleGrid() {
            const over = document.getElementById('grid-overlay');
            if (over.classList.contains('hidden')) {
                const grid = document.getElementById('grid-content');
                grid.innerHTML = '';
                for(let i=0; i<35; i++) {
                    const b = document.createElement('button');
                    const isCurrent = i === currentIdx;
                    const isDone = answers[i] !== null;
                    b.className = `p-4 rounded-xl font-bold border-2 transition-all ${isDone ? 'bg-[#003082] text-white border-[#003082]' : 'bg-white text-slate-400 border-slate-200'} ${isCurrent ? 'ring-4 ring-orange-400 border-orange-400' : ''}`;
                    b.innerText = i + 1;
                    b.onclick = () => { currentIdx = i; render(); toggleGrid(); };
                    grid.appendChild(b);
                }
            }
            over.classList.toggle('hidden');
        }

        function startTimer() {
            const box = document.getElementById('timer-box');
            const timer = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    finishExam();
                } else {
                    timeLeft--;
                    const m = Math.floor(timeLeft / 60);
                    const s = timeLeft % 60;
                    box.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        function finishExam() {
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.c) score++; });
            const p = Math.round((score / 35) * 100);
            const win = p >= 60; 

            let reviewHtml = '';
            questions.forEach((q, i) => {
                const isCorrect = answers[i] === q.c;
                reviewHtml += `
                    <div class="p-6 mb-6 rounded-2xl border-l-8 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Vraag ${i+1} — ${q.title}</p>
                        <p class="font-bold text-slate-800 text-lg mb-4">${q.q}</p>
                        <div class="grid gap-2">
                            <div class="text-sm p-3 rounded bg-white border border-slate-200">
                                <span class="font-bold mr-2 text-slate-400">JOUW KEUZE:</span>
                                ${answers[i] !== null ? q.o[answers[i]] : '<span class="text-red-400 font-bold italic">Niet ingevuld</span>'}
                            </div>
                            ${!isCorrect ? `
                            <div class="text-sm p-3 rounded bg-green-100 border border-green-200 text-green-800">
                                <span class="font-bold mr-2">HET JUISTE ANTWOORD:</span>
                                ${q.o[q.c]}
                            </div>` : ''}
                        </div>
                    </div>
                `;
            });

            document.getElementById('main-header').innerHTML = `<h1 class="p-4 text-center w-full font-black text-white">EINDRESULTAAT</h1>`;
            document.getElementById('main-footer').classList.add('hidden');
            document.getElementById('grid-overlay').classList.add('hidden');
            
            document.getElementById('main-content').innerHTML = `
                <div class="w-full bg-slate-100 overflow-y-auto p-8">
                    <div class="max-w-3xl mx-auto pb-20">
                        <div class="bg-white p-12 rounded-3xl shadow-xl text-center mb-8 border-t-8 ${win ? 'border-green-500' : 'border-red-500'}">
                            <h2 class="text-6xl font-black mb-4 ${win ? 'text-green-600' : 'text-red-600'}">${win ? 'GESLAAGD' : 'GEZAKT'}</h2>
                            <p class="text-xl text-slate-500 mb-8 font-bold">Uw score: ${score} van de 35 goed (${p}%)</p>
                            <button onclick="location.reload()" class="bg-[#003082] text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-900 transition-colors">OPNIEUW PROBEREN</button>
                        </div>
                        <h3 class="text-2xl font-black text-slate-800 mb-6">Review van uw antwoorden:</h3>
                        ${reviewHtml}
                    </div>
                </div>`;
        }

        window.onload = setup;
    </script>
</body>
</html>
