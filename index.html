                content: "De stijgende zorgkosten door welvaartsziekten zoals diabetes en obesitas hebben de discussie over gezonde voeding aangewakkerd. De vraag is in hoeverre de overheid mag ingrijpen in de keuzes die burgers maken. Moet de staat de consumptie van ongezonde producten ontmoedigen via een suikertaks of een verbod op kindermarketing voor snoep?\n\nVoorstanders van overheidsingrijpen wijzen op de zogenaamde 'voedselomgeving'. In supermarkten en op stations worden consumenten voortdurend verleid tot ongezonde keuzes. Volgens hen is het een illusie dat mensen altijd rationele en vrije keuzes maken. Ingrijpen zou de maatschappelijke kosten van de zorg verlagen en de levenskwaliteit verhogen.\n\nTegenstanders benadrukken echter de individuele vrijheid en de eigen verantwoordelijkheid. Zij zien een suikertaks als een vorm van betutteling die vooral de lage inkomensgroepen financieel raakt. Zij pleiten eerder voor betere educatie en transparantie, zoals het invoeren van de 'Nutri-Score' op verpakkingen, zodat consumenten zelf een weloverwogen beslissing kunnen nemen.",
                questions: [
                    { q: "Waarom pleiten voorstanders voor actiever overheidsingrijpen?", options: ["Omdat de industrie te weinig winst maakt op gezonde snacks", "Omdat de huidige omgeving de consument dwingt tot ongezond gedrag", "Omdat er momenteel te weinig productkeuze is", "Omdat mensen geen tijd meer hebben om vers te koken"], correct: 1 },
                    { q: "Wat is een veelgehoord argument tegen een suikerbelasting?", options: ["Het zou financieel kwetsbare groepen zwaarder belasten", "De overheid heeft al genoeg inkomsten uit andere bronnen", "Het is niet mogelijk om de suikerhoeveelheid te meten", "Gezonde voeding zou indirect ook duurder worden"], correct: 0 },
                    { q: "Wat is een punt van kritiek op het gebruik van de 'Nutri-Score'?", options: ["De letters op het label zijn vaak te klein voor ouderen", "Fabrikanten moeten een hoge boete betalen bij een lage score", "Het label verandert volgens critici te vaak van kleur", "De score vergelijkt producten alleen binnen hun eigen categorie"], correct: 3 }

            {
                title: "11. De Crisis op de Nederlandse Woningmarkt",
                content: "De woningmarkt in Nederland zit op slot. Vooral starters en mensen met een middeninkomen vinden nauwelijks nog een betaalbare woning, zowel in de koop- als de huursector. De prijzen zijn de afgelopen jaren geëxplodeerd, terwijl het aanbod achterblijft bij de groeiende behoefte.\n\nDe oorzaken zijn divers. Er is een tekort aan bouwlocaties, de bouwkosten zijn gestegen door strengere milieueisen en er zijn te weinig vakmensen. Bovendien is de gezinssamenstelling veranderd: we wonen vaker alleen, waardoor er meer woningen nodig zijn voor hetzelfde aantal mensen. Dit zet enorme druk op de sociale huursector, waar de wachtlijsten in populaire steden oplopen tot meer dan tien jaar.\n\nDe overheid probeert de regie te hernemen door de verhuurderheffing af te schaffen en gemeenten te dwingen meer sociale woningen te bouwen. Critici vrezen echter dat regulering van de middenhuur beleggers zal afschrikken, waardoor er juist minder nieuwe woningen worden gebouwd. Er is een fundamentele discussie gaande of wonen een recht is dat door de overheid gegarandeerd moet worden, of een marktproduct.",
                questions: [

                    { q: "Waarvoor waarschuwen tegenstanders van strengere huurregulering?", options: ["Dat de huren voor studenten fors zullen stijgen", "Dat de overheid te veel invloed krijgt op de bouwstijl", "Dat investeerders stoppen met het bouwen van huurhuizen", "Dat sociale huurwoningen vaker leeg zullen staan"], correct: 2 }

            {

                content: "Kunstmatige Intelligentie (AI) is niet langer iets uit sciencefictionfilms; het is overal in ons dagelijks leven aanwezig. Van algoritmes die bepalen welke advertenties we zien tot systemen die artsen helpen bij het opsporen van kanker op röntgenfoto's. De mogelijkheden lijken eindeloos en de belofte van verhoogde productiviteit is groot.\n\nToch zijn er ook grote ethische zorgen. Een van de grootste problemen is 'bias' in algoritmes. Als een AI getraind wordt met data die vooroordelen bevatten, zal de AI deze vooroordelen overnemen en versterken. Dit kan leiden tot discriminatie op de arbeidsmarkt of bij de beoordeling van verzekeringsaanvragen. Bovendien roept de opkomst van generatieve AI vragen op over auteursrecht en de verspreiding van desinformatie.\n\nDe Europese Unie loopt voorop met de 'AI Act', de eerste uitgebreide wetgeving ter wereld die de risico's van AI moet beheersen. Het doel is om innovatie te stimuleren, maar tegelijkertijd fundamentele rechten te beschermen. Een belangrijk principe hierbij is transparantie: mensen moeten weten wanneer ze met een algoritme te maken hebben en hoe besluiten tot stand komen.",

        let currentQuestionIndex = 0;
        let userAnswers = new Array(36).fill(null);
        let timeLeft = 100 * 60;
        let timerInterval;

        function init() {
            renderQuestion();
            startTimer();
        }

        function renderQuestion() {
            const textIdx = Math.floor(currentQuestionIndex / 3);
            const qIdxInText = currentQuestionIndex % 3;
            const data = examData[textIdx];
            const question = data.questions[qIdxInText];

            document.getElementById('text-title').innerText = data.title;
            document.getElementById('text-content').innerText = data.content;
            document.getElementById('question-text').innerText = `${currentQuestionIndex + 1}. ${question.q}`;
            document.getElementById('current-text-num').innerText = textIdx + 1;
            document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;

            const optionsList = document.getElementById('options-list');
            optionsList.innerHTML = '';
            
            ['A', 'B', 'C', 'D'].forEach((label, i) => {
                if (question.options[i]) {
                    const div = document.createElement('div');
                    div.className = `option-card p-4 rounded-xl border-2 flex items-center ${userAnswers[currentQuestionIndex] === i ? 'selected' : 'border-gray-100 bg-gray-50'}`;
                    div.innerHTML = `
                        <div class="w-8 h-8 flex-shrink-0 flex items-center justify-center rounded-full bg-blue-100 text-blue-700 font-bold mr-4 text-sm">${label}</div>
                        <div class="text-gray-800">${question.options[i]}</div>
                    `;
                    div.onclick = () => {
                        userAnswers[currentQuestionIndex] = i;
                        renderQuestion();
                    };
                    optionsList.appendChild(div);
                }
            });

            document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
            document.getElementById('next-btn').innerText = currentQuestionIndex === 35 ? 'Inleveren' : 'Volgende vraag';
            updateProgressBar();
        }

        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / 36) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        document.getElementById('next-btn').onclick = () => {
            if (currentQuestionIndex < 35) {
                currentQuestionIndex++;
                renderQuestion();
                document.getElementById('text-container').scrollTop = 0;
            } else {
                finishExam();
            }
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        };

        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const mins = Math.floor(timeLeft / 60);
                const secs = timeLeft % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (timeLeft <= 0) finishExam();
            }, 1000);
        }

        function finishExam() {
            clearInterval(timerInterval);
            let score = 0;
            const reviewList = document.getElementById('review-list');
            reviewList.innerHTML = '';

            userAnswers.forEach((ans, i) => {
                const textIdx = Math.floor(i / 3);
                const correctIdx = examData[textIdx].questions[i % 3].correct;
                const isCorrect = ans === correctIdx;
                if (isCorrect) score++;

                const letters = ['A', 'B', 'C', 'D'];
                const div = document.createElement('div');
                div.className = `p-3 rounded-lg border flex flex-col items-center justify-center ${isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`;
                div.innerHTML = `
                    <span class="text-xs font-bold text-gray-500 mb-1">Q${i + 1}</span>
                    <div class="flex items-center gap-1 font-bold">
                        <span class="${isCorrect ? 'text-green-700' : 'text-red-700'}">${ans !== null ? letters[ans] : '-'}</span>
                        ${!isCorrect ? `<span class="text-gray-400 text-xs">→</span><span class="text-green-700">${letters[correctIdx]}</span>` : ''}
                    </div>
                `;
                reviewList.appendChild(div);
            });

            document.getElementById('score-val').innerText = score;
            document.getElementById('feedback-text').innerText = score >= 22 ? "Gefeliciteerd! Je bent geslaagd (Score: " + Math.round(score/36*100) + "%)" : "Helaas, je hebt onvoldoende gescoord.";
            document.getElementById('results-modal').classList.remove('hidden');
        }

        window.onload = init;
    </script>
