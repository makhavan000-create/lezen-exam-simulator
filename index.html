            {
                title: "De Flexibilisering van de Arbeidsmarkt",
                text: `<h4>Historische verschuiving</h4><p>In de afgelopen decennia is de Nederlandse arbeidsmarkt getuige geweest van een ingrijpende transformatie. Waar een 'baan voor het leven' voorheen de maatschappelijke standaard was, domineert tegenwoordig de flexibele schil. Bedrijven moeten immers razendsnel kunnen opschalen bij piekdrukte en afschalen wanneer de internationale vraag inzakt. Dit vraagt om een grote mate van aanpassingsvermogen van de beroepsbevolking.</p><h4>Gevolgen voor de werknemer</h4><p>Hoewel werkgevers profiteren van deze wendbaarheid, ervaren veel werknemers, met name jongeren, een groeiende onzekerheid. Het ontbreken van een vast contract maakt het lastig om een hypotheek af te sluiten of een stabiele toekomst op te bouwen. Deskundigen waarschuwen dat deze stress op lange termijn nadelige gevolgen kan hebben voor het welzijn van de samenleving.</p><h4>De rol van de overheid</h4><p>De politiek worstelt met de vraag hoe zij deze 'flexwerkers' beter kan beschermen zonder de economische concurrentiepositie van Nederland te schaden. Er wordt nagedacht over nieuwe wetgeving die een balans moet vinden tussen de noodzaak van flexibiliteit voor ondernemers en sociale zekerheid voor de werkenden.</p>`,
                questions: [
                    { q: "Wat is volgens werkgevers het belangrijkste voordeel van flexwerk?", o: ["Het verlagen van de loonkosten voor de overheid.", "Het behouden van een sterke internationale handelspositie.", "Het verhogen van de loyaliteit van het personeel.", "Het stimuleren van pensioenopbouw onder jongeren."], c: 1 },

                    { q: "Wat is de kern van de politieke discussie over flexwerk?", o: ["Hoe men flexwerk volledig kan verbieden in Nederland.", "Het vinden van een balans tussen economie en sociale zekerheid.", "Het verhogen van de belastingen voor grote bedrijven.", "Het verplichten van een baan voor het leven voor iedereen."], c: 1 }
                ]
            },
            {
                title: "Voedselverspilling en Consumentengedrag",
                text: `<h4>De schaal van het probleem</h4><p>Voedselverspilling is een van de grootste ecologische uitdagingen van onze tijd. Alleen al in Nederland belandt jaarlijks voor miljarden euro's aan eetbaar voedsel in de vuilnisbak. Hoewel supermarkten en producenten vaak de schuld krijgen, blijkt uit onderzoek dat de grootste winst te behalen valt bij de consument thuis.</p><h4>Onwetendheid over houdbaarheid</h4><p>Een belangrijke oorzaak van deze verspilling is de verwarring rondom houdbaarheidsdata. Veel consumenten gooien producten weg zodra de THT-datum (Ten minste Houdbaar Tot) is verstreken, terwijl het product vaak nog dagen of zelfs weken veilig geconsumeerd kan worden. De THT-datum is namelijk een garantie voor kwaliteit, niet voor veiligheid.</p><h4>Gedragsverandering</h4><p>Om dit probleem aan te pakken, zijn er diverse campagnes gestart die consumenten leren weer te vertrouwen op hun eigen zintuigen: kijken, ruiken en proeven. Daarnaast wordt het plannen van maaltijden en het slim bewaren van restjes gepromoot als effectieve manieren om minder voedsel te verspillen.</p>`,
                questions: [
                    { q: "Waar kan de meeste winst worden geboekt bij het verminderen van verspilling?", o: ["Bij de boeren die de producten verbouwen.", "In de keukens van de Nederlandse huishoudens.", "Bij de logistieke bedrijven die voedsel vervoeren.", "In de chemische fabrieken die verpakkingen maken."], c: 1 },
                    { q: "Wat is de kern van het probleem met de THT-datum?", o: ["De datum wordt vaak verkeerd gedrukt door fabrikanten.", "Mensen denken ten onrechte dat het product daarna onveilig is.", "De kwaliteit van voedsel is direct na de datum heel slecht.", "Supermarkten mogen producten na die datum niet meer verkopen."], c: 1 },
                    { q: "Wat is een aanbevolen methode om verspilling thuis te voorkomen?", o: ["Altijd meer eten koken dan nodig is.", "Vertrouwen op eigen zintuigen zoals ruiken en proeven.", "Alleen nog maar diepvriesproducten kopen.", "De koelkast op de koudste stand zetten."], c: 1 }
                ]
            },
            {
                title: "Burgerparticipatie in de 'Doe-Democratie'",
                text: `<h4>Een actieve samenleving</h4><p>In de afgelopen jaren is de term 'doe-democratie' steeds vaker te horen in de Nederlandse politiek. Gemeenten trekken zich vaker terug en verwachten dat burgers zelf initiatief tonen voor de verbetering van hun leefomgeving. Dit kan variëren van het onderhouden van een gezamenlijke buurttuin tot het organiseren van zorg voor ouderen in de wijk.</p><h4>Kansen en valkuilen</h4><p>Dit model biedt grote kansen voor de sociale samenhang en kan de gemeentebegroting ontlasten. Echter, sociologen waarschuwen ook voor een keerzijde. Er ontstaat een risico op ongelijkheid tussen wijken. Wijken met veel hoogopgeleide en mondige bewoners slagen er vaak beter in om projecten van de grond te krijgen dan wijken waar mensen kampen met andere zorgen.</p><h4>De rol van de overheid</h4><p>Het is essentieel dat de overheid niet alleen taken afstoot, maar ook ondersteuning blijft bieden waar dat nodig is. Zonder goede begeleiding en financiële ruggensteun voor de structurele kosten dreigen veel mooie burgerinitiatieven na verloop van tijd weer te verdwijnen.</p>`,
                questions: [
                    { q: "Waarom is burgerparticipatie gunstig voor de gemeente?", o: ["Burgers kunnen dan zelf nieuwe wetten schrijven.", "Het bespaart geld en vergroot de betrokkenheid van bewoners.", "Belastingen hoeven dan niet meer geïnd te worden.", "Ambtenaren hebben hierdoor meer tijd voor vakantie."], c: 1 },
                    { q: "Welk risico noemen sociologen bij de 'doe-democratie'?", o: ["Dat burgers de macht van de burgemeester overnemen.", "Dat er grote kwaliteitsverschillen tussen wijken ontstaan.", "Dat de landelijke regelgeving te soepel wordt.", "Dat hoogopgeleiden helemaal geen interesse hebben."], c: 1 },
                    { q: "Wat is vaak een reden dat projecten op de lange termijn mislukken?", o: ["De deelnemers krijgen na een week al ruzie met elkaar.", "Er is geen geld voor de blijvende, structurele kosten.", "De subsidie van de gemeente was vanaf het begin te hoog.", "Bewoners wilden uiteindelijk toch liever parkeerplaatsen."], c: 1 }
                ]
            },
            {
                title: "Digitalisering in de Gezondheidszorg",
                text: `<h4>De noodzaak van technologische innovatie</h4><p>De Nederlandse gezondheidszorg staat onder grote druk door de vergrijzing en het tekort aan personeel. Om de zorg in de toekomst toegankelijk en betaalbaar te houden, wordt er volop ingezet op digitalisering en e-health. Denk hierbij aan consulten via beeldbellen of apps waarmee patiënten zelf hun bloeddruk kunnen monitoren.</p><h4>De digitale kloof</h4><p>Hoewel deze technieken de zelfredzaamheid van veel patiënten vergroten, schuilt er ook een gevaar in. Niet iedereen is even digitaal vaardig. Vooral ouderen en mensen met een lagere opleiding dreigen buiten de boot te vallen als de zorg uitsluitend nog via digitale wegen bereikbaar is.</p><h4>Privacy en vertrouwen</h4><p>Daarnaast is de beveiliging van medische gegevens een cruciaal punt. Patiënten moeten er blindelings op kunnen vertrouwen dat hun privacy gewaarborgd blijft. Artsen benadrukken dat technologie nooit de menselijke maat mag vervangen; het moet juist een middel zijn om meer tijd vrij te maken voor het echte persoonlijke contact in de spreekkamer.</p>`,
                questions: [
                    { q: "Wat is een voordeel van e-health voor de patiënt volgens de tekst?", o: ["De patiënt hoeft nooit meer met een arts te praten.", "De patiënt krijgt meer controle over het eigen zorgtraject.", "De zorgkosten voor de patiënt worden direct gehalveerd.", "De patiënt krijgt gratis toegang tot sneller internet."], c: 1 },
                    { q: "Welk maatschappelijk gevaar schuilt er in de digitalisering van de zorg?", o: ["Dat ziekenhuizen veel minder personeel hoeven aan te nemen.", "Dat er een kloof ontstaat tussen digitaal vaardige en minder vaardige mensen.", "Dat patiënten veel vaker naar de huisarts zullen gaan.", "Dat de overheid alle medische gegevens openbaar zal maken."], c: 1 },
                    { q: "Wat is de ideale rol van technologie volgens de artsen in de tekst?", o: ["Het volledig overnemen van alle medische diagnoses.", "Het vrijmaken van tijd voor persoonlijk contact met de patiënt.", "Het vervangen van de fysieke huisartsenposten in de wijken.", "Het verminderen van het totale medicijngebruik in Nederland."], c: 1 }
                ]
            },
            {
                title: "Meertaligheid op de Basisschool",
                text: `<h4>Een verschuiving in het onderwijs</h4><p>Jarenlang heerste de opvatting dat kinderen met een migratieachtergrond thuis uitsluitend Nederlands moesten spreken om hun schoolprestaties te verbeteren. Leraren adviseerden ouders vaak om hun eigen taal te negeren. Recente wetenschappelijke inzichten hebben dit beeld echter volledig gekanteld.</p><h4>De waarde van de moedertaal</h4><p>Onderzoek toont aan dat een sterke basis in de moedertaal juist cruciaal is voor het leren van een tweede taal, zoals het Nederlands. Wanneer een kind de concepten in de eigen taal goed begrijpt, kan het deze makkelijker vertalen naar een nieuwe taal. Bovendien ontwikkelen meertalige kinderen vaak een grotere mentale flexibiliteit en een beter probleemoplossend vermogen.</p><h4>Een inclusieve aanpak</h4><p>Tegenwoordig wordt meertaligheid op veel scholen juist gezien als een rijkdom. In plaats van de thuistaal te verbieden, wordt er gezocht naar manieren om deze een plek te geven in de klas. Dit versterkt het zelfvertrouwen van de leerlingen en zorgt ervoor dat zij zich sneller thuis voelen in het Nederlandse onderwijssysteem.</p>`,
                questions: [
                    { q: "Wat was vroeger het standaardadvies aan anderstalige ouders?", o: ["Dat leraren het gebruik van de thuistaal moesten stimuleren.", "Dat het spreken van de thuistaal de ontwikkeling van het Nederlands hinderde.", "Dat iedereen verplicht was om minimaal drie talen te leren.", "Dat de thuistaal alleen in het weekend gesproken mocht worden."], c: 1 },
                    { q: "Wat is volgens modern onderzoek de functie van de moedertaal?", o: ["Het zorgt voor onherstelbare taalfouten in het Nederlands.", "Het dient als een noodzakelijke basis voor het leren van een tweede taal.", "Het is minder belangrijk geworden door de komst van internet.", "Het moet zo snel mogelijk worden vervangen door Engels."], c: 1 },
                    { q: "Welk cognitief voordeel van meertaligheid wordt in de tekst genoemd?", o: ["Het ontwikkelen van een fotografisch geheugen.", "Een grotere mentale flexibiliteit bij het oplossen van problemen.", "Het sneller kunnen leren schrijven van lange teksten.", "Een vermindering van de behoefte aan logisch redeneren."], c: 1 }
                ]
            },
            {
                title: "Consumentenpsychologie in de Supermarkt",
                text: `<h4>De geheimen van de winkelvloer</h4><p>Wanneer we een supermarkt binnenlopen, denken we vaak dat we rationele beslissingen nemen. In werkelijkheid worden onze keuzes beïnvloed door een subtiel samenspel van geuren, muziek en de strategische indeling van de winkel. Marketeers weten precies hoe ze onze zintuigen moeten prikkelen om ons meer te laten kopen dan gepland.</p><h4>Slimme indelingen</h4><p>Het is geen toeval dat basisproducten zoals melk en brood vaak helemaal achterin de winkel liggen. De klant wordt hierdoor gedwongen om langs talloze andere schappen te lopen, wat de kans op impulsaankopen aanzienlijk vergroot. Ook de hoogte waarop producten in het schap staan is cruciaal: de duurste merken staan vaak op ooghoogte, terwijl de budgetvarianten onderin te vinden zijn.</p><h4>Prijsbeleving en schaarste</h4><p>Daarnaast wordt er veel gebruikgemaakt van psychologische prijzen en het creëren van een gevoel van schaarste. Acties zoals 'op is op' of 'maximaal 2 per klant' suggereren dat een product zeer gewild is, waardoor consumenten sneller geneigd zijn het in hun karretje te leggen. Ook het tonen van een hoge 'adviesprijs' naast een kortingsprijs (het zogenaamde ankeren) laat ons denken dat we een geweldige deal scoren.</p>`,
                questions: [
                    { q: "Waarom liggen melk en brood vaak achterin de supermarkt?", o: ["Omdat deze producten daar beter gekoeld kunnen worden.", "Om de klant langs zoveel mogelijk andere producten te leiden.", "Omdat er daar meer ruimte is voor de eigen bakkerij.", "Om de overlast voor het winkelpersoneel te minimaliseren."], c: 1 },
                    { q: "Wat probeert een supermarkt te bereiken met 'maximaal 3 per klant'?", o: ["Een eerlijke verdeling van de voorraad over alle klanten.", "Het suggereren dat het product heel gewild en schaars is.", "Het beschermen van de algemene gezondheid van de klant.", "Het controleren van de dagelijkse uitgaven van de consument."], c: 1 },
                    { q: "Wat wordt in de tekst bedoeld met 'ankeren' bij prijzen?", o: ["Het vastzetten van de prijzen voor een heel jaar.", "Een hoge startprijs tonen zodat de korting groter lijkt.", "Het hanteren van de laagste prijs in de gehele markt.", "Het volgen van de internationale marktprijzen."], c: 1 }
                ]
            },
            {
                title: "De Impact van Duurzame Mode",
                text: `<h4>De schaduwkant van Fast Fashion</h4><p>De mode-industrie is tegenwoordig een van de meest vervuilende sectoren ter wereld. Door de opkomst van 'fast fashion' kopen consumenten steeds meer kleding tegen bodemprijzen. Deze kledingstukken zijn vaak van lage kwaliteit en worden na slechts enkele keren dragen weer weggegooid. Dit leidt tot een enorme afvalberg en een gigantisch waterverbruik tijdens de productie.</p><h4>Een noodzakelijke verschuiving</h4><p>Gelukkig groeit het bewustzijn onder consumenten. Er is een duidelijke trend zichtbaar waarbij mensen vaker kiezen voor kwaliteit boven kwantiteit. 'Slow fashion' moedigt aan om te investeren in tijdloze kledingstukken die jarenlang meegaan. Ook de markt voor tweedehands kleding is de laatste jaren geëxplodeerd, mede dankzij handige apps en hippe vintage winkels.</p><h4>De rol van innovatie</h4><p>Daarnaast wordt er geëxperimenteerd met nieuwe materialen, zoals stoffen gemaakt van gerecyclede plastic flessen of plantaardige vezels. Experts stellen dat een circulaire economie, waarin kleding volledig gerecycled kan worden, de enige manier is om de mode-industrie toekomstbestendig te maken. Dit vraagt echter om een grote gedragsverandering van zowel producenten als consumenten.</p>`,
                questions: [
                    { q: "Wat is een kenmerk van 'fast fashion' volgens de tekst?", o: ["Het is kleding die generaties lang meegaat.", "Het is goedkoop geproduceerd en vaak van lage kwaliteit.", "Het wordt uitsluitend verkocht in luxe boetieks.", "Het is altijd gemaakt van 100% biologisch katoen."], c: 1 },
                    { q: "Waarom is de huidige mode-industrie zo schadelijk voor het milieu?", o: ["Omdat er te veel reclame wordt gemaakt voor nieuwe collecties.", "Vanwege het enorme waterverbruik en de grote afvalproductie.", "Omdat de modellen te veel moeten reizen voor fotoshoots.", "Omdat kledingwinkels te veel elektriciteit verbruiken."], c: 1 },
                    { q: "Wat is een oplossing voor de milieuproblemen in de mode-industrie?", o: ["Het stimuleren van consumenten om meer kleding weg te gooien.", "Het kopen van tweedehands kleding en investeren in kwaliteit.", "Het alleen nog maar kopen van kleding in de wintermaanden.", "Het vaker wassen van kleding op zeer hoge temperaturen."], c: 1 }
                ]
            },
            {
                title: "Slaap als Fundament voor Gezondheid",
                text: `<h4>De biologische functie van rust</h4><p>Slaap wordt vaak gezien als een passieve toestand, maar in werkelijkheid is het brein gedurende de nacht uiterst actief. Tijdens de verschillende slaapfases herstelt ons lichaam van fysieke inspanningen en worden de indrukken van de dag verwerkt en opgeslagen in het geheugen. Een goede nachtrust is dus essentieel voor zowel onze fysieke als mentale gezondheid.</p><h4>De gevaren van slaaptekort</h4><p>In onze moderne 24-uurseconomie schiet slaap er echter vaak bij in. Chronisch slaaptekort heeft ernstige gevolgen: het leidt tot concentratieproblemen, stemmingswisselingen en een verzwakt immuunsysteem. Op de lange termijn verhoogt het zelfs het risico op hart- en vaatziekten en burn-out. Deskundigen maken zich vooral zorgen over de invloed van blauw licht van smartphones.</p><h4>Tips voor een betere nachtrust</h4><p>Om de kwaliteit van de slaap te verbeteren, is het belangrijk om een vast ritme aan te houden en de slaapkamer koel en donker te houden. Ook wordt geadviseerd om minstens een uur voor het slapengaan alle schermen uit te zetten, omdat het blauwe licht de aanmaak van het slaaphormoon melatonine verstoort. Een korte wandeling in de avondlucht kan ook wonderen doen.</p>`,
                questions: [
                    { q: "Wat is de belangrijkste taak van het brein tijdens de slaap?", o: ["Het brein stopt volledig met functioneren om uit te rusten.", "Het verwerkt en ordent de informatie van de afgelopen dag.", "Het stimuleert de aanmaak van nieuwe vetcellen in het lichaam.", "Het wist alle vervelende herinneringen automatisch uit."], c: 1 },
                    { q: "Wat is volgens de tekst het effect van blauw licht op onze slaap?", o: ["Het zorgt ervoor dat we sneller in een diepe slaap vallen.", "Het blokkeert de productie van het noodzakelijke slaaphormoon.", "Het verbetert de kwaliteit van onze dromen aanzienlijk.", "Het heeft volgens wetenschappers geen enkele invloed."], c: 1 },
                    { q: "Welk gezondheidsrisico wordt genoemd bij langdurig slaaptekort?", o: ["Een verbetering van het korte-termijngeheugen.", "Een verhoogde kans op concentratieproblemen en ziektes.", "Een afname van het algemene hongergevoel overdag.", "Het vermogen om fysiek veel sneller te kunnen reageren."], c: 1 }
                ]
            },
            {
                title: "De Toekomst van Kunstmatige Intelligentie",
                text: `<h4>Een technologische revolutie</h4><p>Kunstmatige Intelligentie (AI) is niet langer iets uit sciencefictionfilms; het is inmiddels diep doorgedrongen in ons dagelijks leven. We gebruiken het voor het vertalen van teksten, het filteren van spam in onze mailbox en het krijgen van gepersonaliseerde aanbevelingen op streamingdiensten. In de medische wereld helpt AI artsen zelfs bij het sneller opsporen van ziektes op scans.</p><h4>Kansen voor de economie</h4><p>Voorstanders wijzen op de enorme efficiëntieverbeteringen die AI kan brengen. Repetitief en zwaar werk kan door machines worden overgenomen, waardoor mensen hun tijd kunnen besteden aan creatievere en socialere taken. Dit zou kunnen leiden tot een nieuwe golf van economische groei en innovatie in sectoren zoals de landbouw en het transport.</p><h4>Ethische vraagstukken</h4><p>Tegelijkertijd zijn er grote zorgen over de schaduwkanten. Critici waarschuwen voor massaal banenverlies en de verspreiding van desinformatie via 'deepfakes'. Ook de betrouwbaarheid van AI-systemen is een punt van discussie: omdat deze systemen getraind worden met data uit het verleden, kunnen zij onbewust vooroordelen overnemen. Het is aan de politiek om duidelijke regels op te stellen voor het veilig gebruik van deze technologie.</p>`,
                questions: [
                    { q: "In welke sector helpt AI momenteel al bij het stellen van diagnoses?", o: ["In de internationale scheepvaart.", "In de medische wereld via het bekijken van scans.", "In de kinderopvang bij het kiezen van spelletjes.", "In de bouwsector bij het metselen van muren."], c: 1 },
                    { q: "Wat is een belangrijke angst die mensen hebben over AI?", o: ["Dat de internetsnelheid wereldwijd zal afnemen.", "Dat er op grote schaal banen verloren zullen gaan.", "Dat computers in de toekomst veel duurder worden.", "Dat er minder boeken geschreven zullen worden."], c: 1 },
                    { q: "Waarom is de betrouwbaarheid van AI een zorgpunt?", o: ["Omdat AI nooit toegang heeft tot het internet.", "Omdat systemen vooroordelen uit oude data kunnen overnemen.", "Omdat computers alleen goed werken als ze splinternieuw zijn.", "Omdat AI-systemen weigeren om lange teksten te lezen."], c: 1 }
                ]
            },
            {
                title: "Nederlandse Fietsinitiatieven",
                text: `<h4>De fietscultuur in beweging</h4><p>Nederland staat wereldwijd bekend als hét fietsland bij uitstek. Toch zit de overheid niet stil. Om de alsmaar groeiende files op de snelwegen aan te pakken en de CO2-uitstoot te verminderen, wordt er de laatste jaren fors geïnvesteerd in zogenaamde 'snelfietspaden'. Dit zijn brede, geasfalteerde routes zonder stoplichten die steden met elkaar verbinden.</p><h4>Voordelen voor forenzen</h4><p>Deze fietssnelwegen maken het voor forenzen aantrekkelijker om de auto te laten staan, zeker nu de elektrische fiets steeds populairder wordt. Reizen van 15 tot 20 kilometer zijn hiermee prima te overbruggen. Het resultaat is niet alleen een betere luchtkwaliteit in de steden, maar ook fitte en productievere werknemers die met minder stress op hun werk verschijnen.</p><h4>Toekomstige uitdagingen</h4><p>Hoewel de snelfietspaden een groot succes zijn, ontstaan er ook nieuwe uitdagingen. De snelheidsverschillen op het fietspad tussen gewone fietsen en snelle e-bikes zorgen soms voor onveilige situaties. Gemeenten onderzoeken nu of er aparte banen moeten komen of dat er een maximale snelheid op drukke fietspaden moet worden ingevoerd.</p>`,
                questions: [
                    { q: "Wat is het hoofddoel van de aanleg van 'snelfietspaden'?", o: ["Het creëren van parkeerplaatsen voor elektrische steps.", "Een snel en vlot alternatief bieden voor de auto in het woon-werkverkeer.", "Het organiseren van professionele wielerwedstrijden door de stad.", "Het verhogen van de toeristische waarde van de natuurgebieden."], c: 1 },
                    { q: "Welk voordeel voor werknemers wordt in de tekst genoemd?", o: ["Zij krijgen van de baas een gratis elektrische fiets.", "Zij ervaren minder stress en zijn fysiek fitter.", "Zij mogen onderweg gratis gebruikmaken van internet.", "Zij hoeven nooit meer te betalen voor het openbaar vervoer."], c: 1 },
                    { q: "Welk probleem wordt genoemd als gevolg van het succes?", o: ["Er zijn te weinig fietsenmakers in de grote steden.", "Onveilige situaties door grote snelheidsverschillen op het pad.", "De fietspaden worden te duur om te onderhouden.", "Mensen willen toch liever met de bus naar hun werk."], c: 1 }
                ]
            },
            {
                title: "De Onmisbare Rol van Vrijwilligers",
                text: `<h4>Het cement van de samenleving</h4><p>Zonder de inzet van miljoenen vrijwilligers zou Nederland er heel anders uitzien. Vrijwilligers zijn actief in bijna alle geledingen van de maatschappij: van het coachen van een jeugdteam bij de lokale voetbalclub tot het bieden van een luisterend oor bij de Luisterlijn. Zij vormen de onzichtbare motor achter talloze maatschappelijke voorzieningen.</p><h4>Persoonlijke verrijking</h4><p>Vrijwilligerswerk is echter geen eenrichtingsverkeer. Veel mensen geven aan dat het hun leven zin geeft en hun sociale kring vergroot. Vooral voor gepensioneerden is het een effectieve manier om eenzaamheid tegen te gaan en actief betrokken te blijven bij de buurt. Bovendien biedt het jongeren de kans om werkervaring op te doen en nieuwe vaardigheden te ontwikkelen.</p><h4>De uitdagingen voor verenigingen</h4><p>Ondanks het grote belang, hebben veel verenigingen moeite met het vinden van bestuursleden. Mensen willen zich nog wel inzetten voor een eenmalig project, maar schrikken terug voor een langdurige verantwoordelijkheid. Deskundigen pleiten daarom voor meer flexibiliteit in het vrijwilligerswerk, zodat het beter te combineren is met een drukke baan of studie.</p>`,
                questions: [
                    { q: "Wat is een sociaal voordeel van vrijwilligerswerk voor ouderen?", o: ["Zij verdienen hiermee een extra inkomen naast hun pensioen.", "Het helpt hen om actief te blijven en eenzaamheid te voorkomen.", "Zij krijgen hiermee voorrang bij medische behandelingen.", "Zij hoeven geen gemeentelijke belastingen meer te betalen."], c: 1 },
                    { q: "Wat is een grote uitdaging voor moderne verenigingen?", o: ["Het vinden van mensen voor een eenmalig project.", "Het vinden van mensen voor een langdurige bestuursfunctie.", "Het betalen van de hoge salarissen aan de vrijwilligers.", "Het verkrijgen van toestemming van de landelijke overheid."], c: 1 }
                ]
            }
        ];

        let questions = [];
        let answers = new Array(35).fill(null);
        let currentIdx = 0;
        let timeLeft = 110 * 60;

        function setup() {
            questions = [];
            EXAM_BANK.forEach(textSet => {
                textSet.questions.forEach(qObj => {
                    if (questions.length < 35) {
                        questions.push({
                            ...qObj,
                            title: textSet.title,
                            text: textSet.text,
                            id: questions.length
                        });
                    }
                });
            });

            while (questions.length < 35) {
                questions.push({
                    title: "Extra Begrijpend Lezen: Taalontwikkeling",
                    text: "<h4>Het leren van een nieuwe taal</h4><p>Het leren van een taal op volwassen leeftijd is een uitdagend proces dat veel geduld en oefening vereist. In tegenstelling tot kinderen, die talen vaak onbewust oppikken, moeten volwassenen expliciete grammaticaregels leren en actief woordenschat opbouwen. Het is hierbij essentieel om veel contact te hebben met moedertaalsprekers.</p><h4>De invloed van motivatie</h4><p>Wetenschappers zijn het erover eens dat motivatie de belangrijkste factor is voor succes. Mensen die een taal leren omdat ze in het land willen wonen en werken, boeken vaak sneller vooruitgang dan mensen die het alleen voor de hobby doen. Ook het durven maken van fouten speelt een grote rol in de snelheid waarmee iemand de taal vloeiend leert spreken.</p>",
                    q: "Wat is volgens de tekst de belangrijkste factor voor succes bij het leren van een taal?", o: ["Het hebben van een heel duur tekstboek.", "De mate van motivatie van de leerling.", "Het wonen in een groot en modern huis.", "Het kunnen schrijven van perfecte poëzie."],
                    c: 1,
                    id: questions.length
                });
            }

            render();
            startTimer();
        }

        function render() {
            if (!questions[currentIdx]) return;
            
            const q = questions[currentIdx];
            document.getElementById('view-text-title').innerText = q.title;
            document.getElementById('view-text-body').innerHTML = q.text;
            document.getElementById('view-q-text').innerText = q.q;
            document.getElementById('num-display').innerText = currentIdx + 1;
            document.getElementById('q-context').innerText = `Onderwerp: ${q.title}`;

            const opts = document.getElementById('view-options');
            opts.innerHTML = '';
            
            q.o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = `opt-btn ${answers[currentIdx] === i ? 'active' : ''}`;
                b.onclick = () => { answers[currentIdx] = i; render(); };
                b.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold mr-4 text-slate-500 border border-slate-200 flex-shrink-0">${String.fromCharCode(65+i)}</span>
                    <span class="text-slate-700 font-medium">${txt}</span>
                `;
                opts.appendChild(b);
            });

            document.getElementById('btn-prev').disabled = currentIdx === 0;
            document.getElementById('btn-next').innerText = currentIdx === 34 ? 'Examen Afronden' : 'Volgende';
            updateProgress();
        }

        function move(dir) {
            if(dir === 1 && currentIdx === 34) { toggleGrid(); return; }
            const nextIdx = currentIdx + dir;
            if (nextIdx >= 0 && nextIdx < 35) {
                currentIdx = nextIdx;
                document.getElementById('text-pane').scrollTop = 0;
                render();
            }
        }

        function updateProgress() {
            const c = document.getElementById('dot-container');
            c.innerHTML = '';
            for(let i=0; i<35; i++) {
                const d = document.createElement('div');
                d.className = `status-dot ${i === currentIdx ? 'current' : ''} ${answers[i] !== null ? 'done' : ''}`;
                c.appendChild(d);
            }
        }

        function toggleGrid() {
            const over = document.getElementById('grid-overlay');
            if (over.classList.contains('hidden')) {
                const grid = document.getElementById('grid-content');
                grid.innerHTML = '';
                for(let i=0; i<35; i++) {
                    const b = document.createElement('button');
                    const isCurrent = i === currentIdx;
                    const isDone = answers[i] !== null;
                    b.className = `p-4 rounded-xl font-bold border-2 transition-all ${isDone ? 'bg-[#003082] text-white border-[#003082]' : 'bg-white text-slate-400 border-slate-200'} ${isCurrent ? 'ring-4 ring-orange-400 border-orange-400' : ''}`;
                    b.innerText = i + 1;
                    b.onclick = () => { currentIdx = i; render(); toggleGrid(); };
                    grid.appendChild(b);
                }
            }
            over.classList.toggle('hidden');
        }

        function startTimer() {
            const box = document.getElementById('timer-box');
            const timer = setInterval(() => {
                if(timeLeft <= 0) {
                    clearInterval(timer);
                    finishExam();
                } else {
                    timeLeft--;
                    const m = Math.floor(timeLeft / 60);
                    const s = timeLeft % 60;
                    box.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }

        function finishExam() {
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.c) score++; });
            const p = Math.round((score / 35) * 100);
            const win = p >= 60; 

            let reviewHtml = '';
            questions.forEach((q, i) => {
                const isCorrect = answers[i] === q.c;
                reviewHtml += `
                    <div class="p-6 mb-6 rounded-2xl border-l-8 ${isCorrect ? 'bg-green-50 border-green-500' : 'bg-red-50 border-red-500'}">
                        <p class="text-[10px] font-bold text-slate-400 uppercase mb-2">Vraag ${i+1} — ${q.title}</p>
                        <p class="font-bold text-slate-800 text-lg mb-4">${q.q}</p>
                        <div class="grid gap-2">
                            <div class="text-sm p-3 rounded bg-white border border-slate-200">
                                <span class="font-bold mr-2 text-slate-400">JOUW KEUZE:</span>
                                ${answers[i] !== null ? q.o[answers[i]] : '<span class="text-red-400 font-bold italic">Niet ingevuld</span>'}
                            </div>
                            ${!isCorrect ? `
                            <div class="text-sm p-3 rounded bg-green-100 border border-green-200 text-green-800">
                                <span class="font-bold mr-2">HET JUISTE ANTWOORD:</span>
                                ${q.o[q.c]}
                            </div>` : ''}
                        </div>
                    </div>
                `;
            });

            document.getElementById('main-header').innerHTML = `<h1 class="p-4 text-center w-full font-black text-white">EINDRESULTAAT</h1>`;
            document.getElementById('main-footer').classList.add('hidden');
            document.getElementById('grid-overlay').classList.add('hidden');
            
            document.getElementById('main-content').innerHTML = `
                <div class="w-full bg-slate-100 overflow-y-auto p-8">
                    <div class="max-w-3xl mx-auto pb-20">
                        <div class="bg-white p-12 rounded-3xl shadow-xl text-center mb-8 border-t-8 ${win ? 'border-green-500' : 'border-red-500'}">
                            <h2 class="text-6xl font-black mb-4 ${win ? 'text-green-600' : 'text-red-600'}">${win ? 'GESLAAGD' : 'GEZAKT'}</h2>
                            <p class="text-xl text-slate-500 mb-8 font-bold">Uw score: ${score} van de 35 goed (${p}%)</p>
                            <button onclick="location.reload()" class="bg-[#003082] text-white px-10 py-4 rounded-xl font-bold hover:bg-blue-900 transition-colors">OPNIEUW PROBEREN</button>
                        </div>
                        <h3 class="text-2xl font-black text-slate-800 mb-6">Review van uw antwoorden:</h3>
                        ${reviewHtml}
                    </div>
                </div>`;
        }

        window.onload = setup;
    </script>
</body>
</html>
