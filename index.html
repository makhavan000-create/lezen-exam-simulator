    <script>
        const EXAM_BANK = [
            {
                title: "De Toekomst van Thuiswerken",
                text: `<h4>Verschuiving op de arbeidsmarkt</h4><p>Sinds de wereldwijde pandemie is de visie op thuiswerken radicaal veranderd. Waar het voorheen vaak als een gunst van de werkgever werd beschouwd, eisen werknemers tegenwoordig meer flexibiliteit. Dit heeft geleid tot het zogenaamde 'hybride model', waarbij personeel een deel van de week op kantoor verschijnt en de rest vanuit huis werkt. Volgens experts bevordert dit de balans tussen werk en privé, mits de juiste faciliteiten aanwezig zijn.</p><h4>Sociale cohesie en productiviteit</h4><p>Toch waarschuwen psychologen voor de schaduwzijden. Het gebrek aan fysiek contact met collega's kan de creativiteit remmen en leiden tot een gevoel van isolatie. Bovendien vervaagt de grens tussen werkuren en vrije tijd, waardoor het risico op burn-out klachten toeneemt. Bedrijven worden daarom aangemoedigd om vaste kantoordagen in te plannen voor teamoverleg en sociale interactie.</p>`,
                questions: [
                    { q: "Hoe werd thuiswerken vóór de pandemie meestal gezien?", o: ["Als een recht waar elke werknemer aanspraak op kon maken.", "Als een extraatje dat de werkgever kon toestaan.", "Als de standaardmanier van werken voor iedereen.", "Als een noodzakelijke maatregel om kosten te besparen."], c: 1 },
                    { q: "Wat is volgens de tekst een voorwaarde voor een succesvol hybride model?", o: ["Dat werknemers minstens vier dagen op kantoor zijn.", "Dat de werkomgeving thuis goed is ingericht.", "Dat sociale contacten volledig digitaal plaatsvinden.", "Dat de werkgever alle beslissingen neemt over de uren."], c: 1 },
                    { q: "Welk risico van thuiswerken wordt in de tweede alinea benadrukt?", o: ["Dat werknemers te weinig uren maken voor hun salaris.", "Dat de creatieve samenwerking tussen collega's verslechtert.", "Dat er te veel tijd verloren gaat aan overleg.", "Dat kantoorpanden overbodig worden."], c: 1 }
                ]
            },
            {
                title: "Verduurzaming van de Stad",
                text: `<h4>Groene initiatieven</h4><p>De gemeente Amsterdam investeert fors in het 'vergroenen' van de binnenstad. Door het aanleggen van daktuinen en het vervangen van tegels door planten, hoopt men de effecten van hittestress te verminderen. Tijdens hete zomers blijft de warmte namelijk hangen tussen de dichte bebouwing, wat gezondheidsproblemen kan veroorzaken bij kwetsbare groepen. Bewoners worden gestimuleerd om ook hun eigen tuin of balkon aan te passen.</p><h4>De rol van de burger</h4><p>Hoewel de overheid de kaders schept, ligt de uiteindelijke verantwoordelijkheid bij de burger. Er zijn subsidies beschikbaar voor het isoleren van woningen en de aanschaf van warmtepompen. Echter, de administratieve rompslomp weerhoudt veel mensen ervan om de aanvraag daadwerkelijk in te dienen. Critici pleiten daarom voor een eenvoudiger systeem met directe kortingen aan de kassa.</p>`,
                questions: [
                    { q: "Waarom wil de gemeente meer planten in de stad?", o: ["Om de stad aantrekkelijker te maken voor toeristen.", "Om te voorkomen dat het in de zomer extreem warm blijft.", "Om meer ruimte te creëren voor nieuwe parkeerplaatsen.", "Om de verkoop van daktuinen te stimuleren."], c: 1 },
                    { q: "Wat is volgens de tekst het grootste probleem bij de huidige subsidies?", o: ["De bedragen die de overheid geeft zijn veel te laag.", "Het proces om de subsidie te krijgen is te ingewikkeld.", "Er is bijna geen informatie over de regelingen te vinden.", "De subsidies zijn alleen voor mensen met een laag inkomen."], c: 1 },
                    { q: "Wat stellen de 'critici' voor als oplossing?", o: ["Het stopzetten van alle subsidies voor isolatie.", "Een methode waarbij mensen direct minder betalen bij aankoop.", "Het verplicht stellen van warmtepompen voor elk huishouden.", "Het inhuren van meer ambtenaren voor de administratie."], c: 1 }
                ]
            },
            {
                title: "Vrijwillige Inzet in de Zorg",
                text: `<h4>Een onmisbare schakel</h4><p>De druk op de professionele ouderenzorg neemt toe door de vergrijzing. Vrijwilligers worden steeds vaker ingezet om de kwaliteit van leven van bewoners te waarborgen. Hun taken variëren van het maken van een wandeling tot het ondersteunen bij de maaltijden. Het is echter cruciaal om te begrijpen dat vrijwilligers nooit de medische taken van verpleegkundigen mogen overnemen; zij zijn er puur voor de sociale ondersteuning en hand-en-spandiensten.</p><h4>Begeleiding en training</h4><p>Om de veiligheid van zowel de cliënt als de vrijwilliger te garanderen, bieden zorginstellingen introductiecursussen aan. Hierin leert men hoe om te gaan met dementie en hoe fysieke overbelasting te voorkomen. Een goede match tussen de interesses van de vrijwilliger en de behoeften van de bewoner is essentieel voor een langdurige samenwerking. Evaluaties wijzen uit dat dit contact ook voor de vrijwilliger zelf veel voldoening geeft.</p>`,
                questions: [
                    { q: "Waarom is de inzet van vrijwilligers in de zorg zo belangrijk?", o: ["Omdat zij goedkoper zijn dan gediplomeerde verpleegkundigen.", "Omdat de professionele zorg het werk niet meer alleen aankan.", "Omdat zij verantwoordelijk zijn voor het uitdelen van medicijnen.", "Omdat zij beslissen over de behandeling van de cliënten."], c: 1 },
                    { q: "Wat wordt er gezegd over de grens van het vrijwilligerswerk?", o: ["Vrijwilligers mogen alleen werken als er geen verpleegkundige is.", "Medische handelingen blijven de taak van professionals.", "Vrijwilligers moeten na een jaar stoppen met hun werk.", "Vrijwilligers bepalen zelf welke taken ze uitvoeren."], c: 1 },
                    { q: "Wat is het doel van de cursussen voor vrijwilligers?", o: ["Zorgen dat zij sneller een baan in de zorg kunnen vinden.", "Kennis bijbrengen over het omgaan met specifieke ziektebeelden.", "Het controleren of de vrijwilliger wel hard genoeg werkt.", "Het besparen op kosten voor externe trainingsbureaus."], c: 1 }
                ]
            },
            {
                title: "De Kracht van de Kringloop",
                text: `<h4>Tweedehands als trend</h4><p>De populariteit van kringloopwinkels is de afgelopen jaren enorm gestegen. Dit heeft niet alleen te maken met de lagere prijzen, maar ook met een groeiend milieubewustzijn. Consumenten realiseren zich dat de productie van nieuwe goederen, zoals kleding en elektronica, een enorme impact heeft op de aarde. Door hergebruik te stimuleren, wordt de afvalberg verkleind en worden grondstoffen bespaard.</p><h4>Sociale werkgelegenheid</h4><p>Naast de ecologische voordelen hebben veel kringloopbedrijven een sociale missie. Ze bieden werkplekken aan mensen die elders op de arbeidsmarkt moeilijk aan de bak komen. Hierbij valt te denken aan langdurig werklozen of mensen met een arbeidsbeperking. Onder professionele begeleiding leren zij vaardigheden die de kans op een reguliere baan vergroten. De winst van de winkel vloeit vaak terug naar maatschappelijke projecten.</p>`,
                questions: [
                    { q: "Wat is een belangrijke reden dat mensen naar de kringloop gaan?", o: ["Omdat de kwaliteit van de spullen altijd beter is dan nieuw.", "Vanwege een combinatie van prijs en zorg voor het milieu.", "Omdat het verboden is om nieuwe kleding te kopen.", "Omdat de winkels altijd in de buurt van een park zijn."], c: 1 },
                    { q: "Welke 'sociale missie' hebben veel van deze winkels?", o: ["Het gratis weggeven van spullen aan iedereen die dat wil.", "Het helpen van mensen met een afstand tot de arbeidsmarkt.", "Het organiseren van feesten voor de hele buurt.", "Het vervangen van grote commerciële supermarkten."], c: 1 },
                    { q: "Wat gebeurt er meestal met de winst van een kringloopwinkel?", o: ["De winst gaat direct naar de overheid als belasting.", "Het geld wordt geïnvesteerd in goede doelen of projecten.", "De werknemers krijgen een extra hoog salaris.", "De winst wordt gebruikt om nieuwe producten te importeren."], c: 1 }
                ]
            },
            {
                title: "Onderwijs en Digitalisering",
                text: `<h4>De laptop in de klas</h4><p>In het moderne onderwijs is de computer niet meer weg te denken. Veel scholen kiezen voor 'gepersonaliseerd leren', waarbij software zich aanpast aan het niveau van de leerling. Dit stelt snelle leerlingen in staat om vooruit te werken, terwijl leerlingen die meer moeite hebben extra uitleg en oefeningen krijgen. De docent krijgt hierdoor een coachende rol en heeft meer tijd voor individuele begeleiding.</p><h4>Schermtijd en concentratie</h4><p>Er klinkt echter ook kritiek. Te veel schermtijd zou ten koste gaan van de concentratie en de fijne motoriek, zoals het handschrift. Bovendien is er bezorgdheid over de afhankelijkheid van commerciële softwareleveranciers. Wetenschappers adviseren daarom een 'blended' aanpak: een gezonde mix tussen digitale middelen en traditionele methodes zoals boeken en fysieke samenwerking in de klas.</p>`,
                questions: [
                    { q: "Wat is een voordeel van de software bij gepersonaliseerd leren?", o: ["Alle leerlingen maken precies dezelfde opdrachten op hetzelfde tempo.", "Het programma past de moeilijkheidsgraad aan de leerling aan.", "De docent hoeft zelf geen uitleg meer te geven aan de klas.", "Leerlingen hoeven niet meer naar school te komen."], c: 1 },
                    { q: "Hoe verandert de rol van de docent door deze digitalisering?", o: ["De docent wordt minder belangrijk voor de leerlingen.", "De docent kan zich meer richten op persoonlijke hulp.", "De docent moet alle software zelf programmeren.", "De docent controleert alleen nog maar of de computers aanstaan."], c: 1 },
                    { q: "Wat wordt bedoeld met een 'blended' aanpak?", o: ["Alleen nog maar werken met computers in de klas.", "Een combinatie van digitale en ouderwetse leermiddelen.", "Het mengen van verschillende klassen op basis van leeftijd.", "Het verbieden van alle schermen tijdens de pauze."], c: 1 }
                ]
            },
            {
                title: "Veilig Internetgebruik",
                text: `<h4>Cybercriminaliteit</h4><p>Met de toename van online winkelen en bankieren groeit ook het risico op internetfraude. Phishing is een veelvoorkomende methode waarbij criminelen via e-mail proberen inloggegevens te stelen. Ze doen zich vaak voor als een betrouwbare instantie, zoals de bank of de belastingdienst. Het is essentieel om nooit op verdachte links te klikken en altijd het webadres te controleren voordat men persoonlijke informatie invoert.</p><h4>Wachtwoordbeheer</h4><p>Een sterk wachtwoord is de eerste verdedigingslinie. Experts raden aan om voor elke website een unieke combinatie van letters, cijfers en symbolen te gebruiken. Omdat dit lastig te onthouden is, kan een 'wachtwoordmanager' uitkomst bieden. Daarnaast biedt tweestapsverificatie extra beveiliging; hierbij is naast het wachtwoord ook een code nodig die naar de mobiele telefoon wordt gestuurd.</p>`,
                questions: [
                    { q: "Hoe gaan criminelen bij 'phishing' meestal te werk?", o: ["Ze breken fysiek in bij het kantoorgebouw van een bank.", "Ze sturen valse berichten om gegevens te stelen.", "Ze blokkeren de hele internetverbinding van een stad.", "Ze verkopen illegale software in een gewone winkel."], c: 1 },
                    { q: "Wat is een nadeel van het hebben van veel unieke wachtwoorden?", o: ["Het is verboden door de meeste internetproviders.", "Het is moeilijk om ze allemaal te onthouden.", "Wachtwoorden met symbolen werken vaak niet.", "Het maakt je computer veel trager."], c: 1 },
                    { q: "Wat is de functie van tweestapsverificatie?", o: ["Het automatisch veranderen van je wachtwoord elke week.", "Een extra controle via je telefoon om in te loggen.", "Het controleren of je wel een legaal abonnement hebt.", "Het sneller maken van de internetverbinding."], c: 1 }
                ]
            },
            {
                title: "Gezonde Voeding op School",
                text: `<h4>De gezonde kantine</h4><p>Steeds meer middelbare scholen bannen frisdrank en vette snacks uit hun kantines. In plaats daarvan worden fruit, volkorenbroodjes en water aangeboden. Het idee is dat een gezonde lunch bijdraagt aan betere leerprestaties en minder energiedips in de middag. Hoewel sommige leerlingen klagen over het gebrek aan keuze, blijkt uit onderzoek dat ze sneller gezonde keuzes maken als het aanbod beperkt is tot goede alternatieven.</p><h4>Educatie en bewustwording</h4><p>Alleen het aanpassen van het assortiment is niet voldoende. Scholen besteden ook in de lessen aandacht aan de herkomst van voedsel en de impact van suiker op het lichaam. Kooklessen waarbij leerlingen zelf leren om verse maaltijden te bereiden, zijn populair en effectief. Het doel is om jongeren vaardigheden mee te geven waar ze de rest van hun leven profijt van hebben in hun eigen huishouden.</p>`,
                questions: [
                    { q: "Wat is volgens de tekst een effect van een gezonde lunch?", o: ["Leerlingen worden sneller moe in de middag.", "De concentratie van de leerlingen verbetert.", "Scholen kunnen meer geld verdienen aan de kantine.", "Leerlingen hoeven minder huiswerk te maken."], c: 1 },
                    { q: "Hoe reageren leerlingen op de veranderingen in de kantine?", o: ["Ze zijn allemaal meteen heel enthousiast.", "Sommigen vinden het jammer dat er minder keus is.", "Ze weigeren voortaan om op school te eten.", "Ze nemen zelf frisdrank mee voor de hele klas."], c: 1 },
                    { q: "Wat is het langetermijndoel van de kooklessen?", o: ["Dat leerlingen later professioneel kok worden.", "Dat leerlingen later zelfstandig gezond kunnen koken.", "Het verkopen van kookboeken die door de school zijn gemaakt.", "Het besparen op de kosten van de schoolcatering."], c: 1 }
                ]
            },
            {
                title: "Stedelijke Mobiliteit",
                text: `<h4>Deelmobiliteit</h4><p>In grote steden zien we een verschuiving van eigen autobezit naar 'deelmobiliteit'. Via apps kunnen burgers eenvoudig een elektrische fiets, scooter of auto huren voor een korte rit. Dit vermindert de parkeerdruk en de uitstoot van schadelijke stoffen. Echter, de rondslingerende voertuigen op de stoep zorgen voor ergernis bij voetgangers en mensen met een beperking. Gemeenten zoeken naar oplossingen door vaste parkeervakken aan te wijzen.</p><h4>Openbaar Vervoer</h4><p>Ondanks de populariteit van deelfietsen blijft het openbaar vervoer (OV) de ruggengraat van de stad. Om het OV aantrekkelijk te houden, wordt er geïnvesteerd in snellere verbindingen en een hogere frequentie. Een punt van zorg zijn de stijgende ticketprijzen, waardoor het voor mensen met een klein budget soms lastig is om de stad te doorkruisen. Er wordt gesproken over sociale tarieven voor minima.</p>`,
                questions: [
                    { q: "Wat is een voordeel van deelmobiliteit?", o: ["Iedereen krijgt een gratis elektrische scooter van de gemeente.", "Er zijn minder eigen auto's nodig, wat ruimte bespaart.", "Je hoeft geen rijbewijs meer te hebben voor een deelauto.", "De voertuigen mogen overal op de stoep geparkeerd worden."], c: 1 },
                    { q: "Welk nadeel van deelvoertuigen wordt in de tekst genoemd?", o: ["Ze zijn veel langzamer dan gewone fietsen.", "Ze staan soms op plekken waar ze in de weg staan.", "De batterijen zijn altijd leeg als je ze nodig hebt.", "Je kunt ze alleen huren als je in de stad woont."], c: 1 },
                    { q: "Waarom maken sommige mensen zich zorgen over het OV?", o: ["Omdat de treinen en bussen te vaak leeg rijden.", "Vanwege de hoge kosten voor reizigers met weinig geld.", "Omdat er geen wifi aanwezig is in de voertuigen.", "Omdat de chauffeurs niet vriendelijk genoeg zouden zijn."], c: 1 }
                ]
            },
            {
                title: "Consumptie en Marketing",
                text: `<h4>De invloed van reclame</h4><p>We worden dagelijks blootgesteld aan duizenden reclame-uitingen, zowel op straat als online. Bedrijven gebruiken geavanceerde algoritmes om advertenties te tonen die precies aansluiten bij onze zoekgeschiedenis en interesses. Dit kan leiden tot impulsaankopen: producten die we eigenlijk niet nodig hebben, maar die op dat moment heel verleidelijk lijken. Vooral jongeren zijn gevoelig voor de invloed van 'influencers' op sociale media.</p><h4>Bewust consumeren</h4><p>Er ontstaat een tegenbeweging van mensen die kiezen voor 'minimalisme'. Zij proberen bewust minder spullen te kopen en te focussen op ervaringen in plaats van bezit. Dit is niet alleen goed voor de portemonnee, maar ook voor de geestelijke gezondheid, omdat een opgeruimd huis vaak zorgt voor een opgeruimd hoofd. Kritisch kijken naar de noodzaak van een aankoop is hierbij de belangrijkste stap.</p>`,
                questions: [
                    { q: "Hoe weten bedrijven welke advertenties ze aan jou moeten tonen?", o: ["Ze gokken op basis van je leeftijd en woonplaats.", "Ze gebruiken gegevens over wat je eerder online hebt opgezocht.", "Ze vragen je elke dag om een lijstje met interesses te maken.", "Ze laten gewoon aan iedereen precies dezelfde reclame zien."], c: 1 },
                    { q: "Wat is een 'impulsaankoop'?", o: ["Een aankoop die je al maanden van plan was te doen.", "Iets wat je koopt zonder er goed over na te denken.", "Een aankoop die je doet via een ouderwetse krantenadvertentie.", "Het kopen van producten die alleen in de aanbieding zijn."], c: 1 },
                    { q: "Wat is volgens de tekst een psychologisch voordeel van minimalisme?", o: ["Je kunt al je geld uitgeven aan dure vakanties.", "Minder spullen in huis zorgt voor meer rust in je hoofd.", "Je krijgt meer volgers op je sociale media kanalen.", "Je hoeft nooit meer schoon te maken."], c: 1 }
                ]
            },
            {
                title: "Cultuur en Identiteit",
                text: `<h4>Tradities in beweging</h4><p>Cultuur is geen statisch gegeven, maar verandert voortdurend onder invloed van migratie en globalisering. Oude tradities krijgen nieuwe vormen en er ontstaan nieuwe gewoontes. In Nederland zien we dit bijvoorbeeld terug in de keuken, waar gerechten uit alle windstreken inmiddels als 'typisch Nederlands' worden beschouwd. Deze uitwisseling verrijkt de samenleving, maar zorgt soms ook voor discussie over het behoud van de eigen identiteit.</p><h4>Musea en erfgoed</h4><p>Musea spelen een belangrijke rol bij het bewaren van ons gezamenlijke verleden. Zij beheren kunstschatten en historische voorwerpen die ons vertellen waar we vandaan komen. Tegenwoordig proberen musea ook vaker de verhalen te vertellen van groepen die voorheen onderbelicht bleven. Hierdoor ontstaat een completer en eerlijker beeld van de geschiedenis, wat bijdraagt aan meer onderling begrip tussen verschillende bevolkingsgroepen.</p>`,
                questions: [
                    { q: "Wat wordt in de tekst gezegd over cultuur?", o: ["Het is iets dat altijd precies hetzelfde moet blijven.", "Het verandert constant door invloeden van buitenaf.", "Het wordt alleen bepaald door de overheid.", "Het heeft niets te maken met eten of tradities."], c: 1 },
                    { q: "Welke ontwikkeling zien we bij moderne musea?", o: ["Ze tonen alleen nog maar moderne kunstwerken.", "Ze besteden aandacht aan verhalen die vroeger niet verteld werden.", "Ze zijn gratis geworden voor alle inwoners van het land.", "Ze stoppen met het verzamelen van historische voorwerpen."], c: 1 },
                    { q: "Wat is het effect van een 'eerlijker beeld' van de geschiedenis?", o: ["Mensen krijgen meer ruzie over wie er gelijk heeft.", "Het zorgt ervoor dat mensen elkaar beter gaan begrijpen.", "Het maakt de geschiedenisles op school een stuk korter.", "Het is alleen interessant voor wetenschappers."], c: 1 }
                ]
            },
            {
                title: "Het Belang van Slaap",
                text: `<h4>Functies van de nachtrust</h4><p>Slaap wordt vaak onderschat, terwijl het essentieel is voor het herstel van lichaam en geest. Tijdens de slaap verwerkt het brein de indrukken van de dag en worden cellen in het lichaam gerepareerd. Mensen die chronisch te weinig slapen, hebben een verhoogd risico op hart- en vaatziekten, overgewicht en depressie. Een volwassene heeft gemiddeld zeven tot acht uur kwalitatieve slaap per nacht nodig om optimaal te kunnen functioneren.</p><h4>Slaaphygiëne</h4><p>Om de kwaliteit van de slaap te verbeteren, is een goede 'slaaphygiëne' van belang. Dit houdt in dat men een vast ritme aanhoudt en cafeïne vermijdt in de avonduren. Ook het blauwe licht van telefoons en tablets verstoort de aanmaak van het slaaphormoon melatonine. Deskundigen raden aan om minstens een uur voor het slapengaan alle schermen uit te schakelen en te kiezen voor een ontspannende activiteit zoals lezen.</p>`,
                questions: [
                    { q: "Wat gebeurt er in het brein tijdens de slaap?", o: ["Het brein stopt volledig met werken om energie te besparen.", "Informatie en indrukken van de dag worden verwerkt.", "Het brein maakt plannen voor de volgende ochtend.", "Er worden nieuwe talen geleerd zonder dat je het merkt."], c: 1 },
                    { q: "Waarom is blauw licht van schermen slecht voor de slaap?", o: ["Het maakt de ogen te moe om dicht te gaan.", "Het blokkeert de aanmaak van een belangrijk slaaphormoon.", "Het zorgt ervoor dat de batterij van je telefoon sneller leeg gaat.", "Het verhoogt de temperatuur in de slaapkamer."], c: 1 },
                    { q: "Wat is een voorbeeld van goede 'slaaphygiëne'?", o: ["Elke avond op een ander tijdstip naar bed gaan.", "Vlak voor het slapen een sterke kop koffie drinken.", "Elke dag op ongeveer hetzelfde tijdstip gaan slapen.", "Je e-mail nog even snel beantwoorden in bed."], c: 2 }
                ]
            },
            {
                title: "Belastingen in Nederland",
                text: `<h4>Inkomstenbelasting</h4><p>In Nederland betaalt iedereen die inkomen heeft belasting. Dit geld wordt gebruikt voor publieke voorzieningen zoals wegen, scholen en politie. De belasting is 'progressief', wat betekent dat mensen met een hoger inkomen een hoger percentage aan de fiscus afdragen. Elk jaar in maart en april moeten burgers hun belastingaangifte doen. Gelukkig zijn veel gegevens al vooraf ingevuld door de Belastingdienst.</p><h4>Toeslagen</h4><p>Voor mensen met een lager inkomen zijn er toeslagen beschikbaar om de kosten van bijvoorbeeld zorg of huur te verlichten. De hoogte van deze toeslag is afhankelijk van het inkomen en de gezinssituatie. Het is belangrijk om wijzigingen in het inkomen direct door te geven, omdat men anders later geld moet terugbetalen. Dit systeem zorgt voor een eerlijkere verdeling van de lasten in de samenleving.</p>`,
                questions: [
                    { q: "Wat betekent het dat de belasting in Nederland 'progressief' is?", o: ["Dat de belasting elk jaar een klein beetje hoger wordt.", "Dat wie meer verdient, relatief meer belasting betaalt.", "Dat je alleen belasting betaalt als je een eigen bedrijf hebt.", "Dat het geld alleen naar moderne projecten gaat."], c: 1 },
                    { q: "Wat is een voordeel van de jaarlijkse belastingaangifte?", o: ["Je hoeft het formulier pas in de zomer op te sturen.", "Veel informatie is al door de overheid in het systeem gezet.", "Je krijgt altijd geld terug, ongeacht je salaris.", "Je hoeft geen bewijzen van je inkomen meer te bewaren."], c: 1 },
                    { q: "Waarom moet je een verandering in je inkomen doorgeven aan de Toeslagen?", o: ["Omdat je anders een boete krijgt van de politie.", "Om te voorkomen dat je later een groot bedrag moet terugbetalen.", "Omdat de Toeslagen anders je bankrekening blokkeren.", "Zodat de overheid je een felicitatie kan sturen."], c: 1 }
                ]
            }
        ];

        let questions = [];
        let answers = new Array(35).fill(null);
        let currentIdx = 0;
        let timeLeft = 110 * 60;

        function setup() {
            questions = [];
            // Create the exam structure from the bank
            for (const textSet of EXAM_BANK) {
                for (const qObj of textSet.questions) {
                    if (questions.length < 35) {
                        questions.push({
                            ...qObj,
                            title: textSet.title,
                            text: textSet.text,
                            id: questions.length
                        });
                    }
                }
            }
            render();
            startTimer();
        }

        function render() {
            const q = questions[currentIdx];
            document.getElementById('view-text-title').innerText = q.title;
            document.getElementById('view-text-body').innerHTML = q.text;
            document.getElementById('view-q-text').innerText = q.q;
            document.getElementById('num-display').innerText = currentIdx + 1;
            document.getElementById('q-context').innerText = `Onderwerp: ${q.title}`;

            const opts = document.getElementById('view-options');
            opts.innerHTML = '';
            q.o.forEach((txt, i) => {
                const b = document.createElement('button');
                b.className = `opt-btn ${answers[currentIdx] === i ? 'active' : ''}`;
                b.onclick = () => { answers[currentIdx] = i; render(); };
                b.innerHTML = `
                    <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold mr-4 text-slate-500 flex-shrink-0 border border-slate-200">${String.fromCharCode(65+i)}</span>
                    <span class="text-slate-700 font-medium">${txt}</span>
                `;
                opts.appendChild(b);
            });

            document.getElementById('btn-prev').disabled = currentIdx === 0;
            document.getElementById('btn-next').innerText = currentIdx === 34 ? 'Examen Inleveren' : 'Volgende Vraag';
            updateProgress();
        }

        function move(dir) {
            if(dir === 1 && currentIdx === 34) { toggleGrid(); return; }
            currentIdx = Math.max(0, Math.min(34, currentIdx + dir));
            document.getElementById('text-pane').scrollTop = 0;
            render();
        }

        function updateProgress() {
            const c = document.getElementById('dot-container');
            c.innerHTML = '';
            for(let i=0; i<35; i++) {
                const d = document.createElement('div');
                d.className = `status-dot ${i === currentIdx ? 'current' : ''} ${answers[i] !== null ? 'done' : ''}`;
                c.appendChild(d);
            }
        }

        function toggleGrid() {
            const over = document.getElementById('grid-overlay');
            const grid = document.getElementById('grid-content');
            grid.innerHTML = '';
            for(let i=0; i<35; i++) {
                const b = document.createElement('button');
                const isCurrent = i === currentIdx;
                const isDone = answers[i] !== null;
                b.className = `p-4 rounded-xl font-black text-lg border-2 transition-all ${isDone ? 'bg-[#003082] text-white' : 'bg-white text-slate-300 border-slate-200 border-dashed'} ${isCurrent ? 'ring-4 ring-orange-400' : ''}`;
                b.innerText = i + 1;
                b.onclick = () => { currentIdx = i; render(); toggleGrid(); };
                grid.appendChild(b);
            }
            over.classList.toggle('hidden');
        }

        function startTimer() {
            const box = document.getElementById('timer-box');
            setInterval(() => {
                if(timeLeft <= 0) finishExam();
                timeLeft--;
                const m = Math.floor(timeLeft / 60);
                const s = timeLeft % 60;
                box.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }, 1000);
        }

        function finishExam() {
            let score = 0;
            questions.forEach((q, i) => { if(answers[i] === q.c) score++; });
            const p = Math.round((score / 35) * 100);
            const win = p >= 60; // 60% is standard B1 pass mark

            let reviewHtml = '';
            questions.forEach((q, i) => {
                const isCorrect = answers[i] === q.c;
                reviewHtml += `
                    <div class="review-card ${isCorrect ? 'review-correct' : 'review-wrong'} p-6 mb-6 shadow-sm border border-slate-100">
                        <div class="flex justify-between items-start mb-2">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Vraag ${i+1} — ${q.title}</p>
                            ${isCorrect ? '<span class="text-green-600 font-bold text-xs uppercase">Correct</span>' : '<span class="text-red-600 font-bold text-xs uppercase">Onjuist</span>'}
                        </div>
                        <p class="font-bold text-slate-900 text-lg mb-4 leading-snug">${q.q}</p>
                        <div class="space-y-3">
                            <div class="p-3 rounded-lg ${isCorrect ? 'bg-green-50' : 'bg-red-50'} border ${isCorrect ? 'border-green-100' : 'border-red-100'}">
                                <p class="text-xs font-bold mb-1 uppercase opacity-60">Jouw antwoord:</p>
                                <p class="text-slate-800">${answers[i] !== null ? q.o[answers[i]] : '<em>Niet beantwoord</em>'}</p>
                            </div>
                            ${!isCorrect ? `
                            <div class="p-3 rounded-lg bg-green-50 border border-green-100">
                                <p class="text-xs font-bold mb-1 uppercase opacity-60">Het juiste antwoord:</p>
                                <p class="text-slate-800 font-semibold">${q.o[q.c]}</p>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            });

            document.getElementById('main-header').classList.add('hidden');
            document.getElementById('main-footer').classList.add('hidden');
            document.getElementById('grid-overlay').classList.add('hidden');
            
            document.getElementById('main-content').innerHTML = `
                <div class="w-full h-full bg-slate-50 overflow-y-auto p-12">
                    <div class="max-w-4xl mx-auto">
                        <div class="bg-white rounded-[2.5rem] shadow-2xl p-12 text-center mb-12 border-b-[16px] ${win ? 'border-green-500' : 'border-red-500'}">
                            <h2 class="text-5xl font-black mb-4 ${win ? 'text-green-600' : 'text-red-600'}">${win ? 'GESLAAGD!' : 'NIET GESLAAGD'}</h2>
                            <p class="text-slate-500 font-bold text-xl mb-10">Staatsexamen NT2 Programma I (B1) - Leesvaardigheid</p>
                            <div class="flex justify-center items-center gap-12 mb-10 bg-slate-50 p-8 rounded-3xl border border-slate-100">
                                <div><div class="text-7xl font-black text-slate-900">${p}%</div><p class="text-slate-400 font-bold uppercase tracking-tighter">Resultaat</p></div>
                                <div class="h-16 w-px bg-slate-200"></div>
                                <div class="text-left"><p class="text-3xl font-black text-slate-700">${score} / 35</p><p class="text-slate-400 font-bold uppercase tracking-tighter">Aantal goed</p></div>
                            </div>
                            <button onclick="location.reload()" class="bg-[#003082] text-white px-12 py-5 rounded-2xl font-black text-xl hover:bg-blue-900 shadow-xl transition-all">OPNIEUW PROBEREN</button>
                        </div>
                        <div class="space-y-4">
                            <h3 class="text-2xl font-black text-slate-800 mb-8 flex items-center gap-3 underline decoration-[#003082] decoration-4 underline-offset-8">Foutenanalyse en Review</h3>
                            ${reviewHtml}
                        </div>
                    </div>
                </div>`;
        }

        setup();
    </script>
</body>
</html>
